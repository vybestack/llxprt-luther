name: OCR PR Review

# Runs OpenCodeReview (OCR) on pull requests alongside the existing review
# bot. OCR is an observational, non-required review signal while it is being
# proven out. The existing review bot remains enabled and untouched.
#
# Fork-safety model: this workflow uses `pull_request_target` so repository
# secrets are available for fork PRs, but it NEVER checks out or executes
# PR-supplied code/config while secrets are in scope. The trusted base
# branch is checked out first; the PR head is fetched into an explicit local
# ref and read for diff computation only. No make/cargo/npm-repo-scripts are
# invoked. OCR rules/config are configured from variables+secret only; no
# PR-supplied OCR rules are loaded.
#
# Infrastructure vs. policy failures: OCR runtime/provider/install problems are
# recorded as non-blocking infrastructure failures (surfaced via warnings, the
# sticky summary, and a tracking issue). Only genuine policy breaches (a changed
# test file missing from OCR's reviewed set) fail the PR check.

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  # Read-only access to the run's own artifacts so the infrastructure-failure
  # notification job can download the OCR diagnostics. Kept in the single
  # top-level block to preserve the minimal-permissions invariant.
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Keep CI reviews deterministic by disabling OCR self-update checks.
  OCR_NO_UPDATE: "1"
  # Disable colorized CLI output so text parsers (e.g. the changed-test
  # scope guard) always see plain text.
  NO_COLOR: "1"

jobs:
  gate:
    name: Resolve OpenCodeReview trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.trigger.outputs.should_run }}
      group_key: ${{ steps.trigger.outputs.group_key }}
    steps:
      - name: Resolve trigger
        id: trigger
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # ratchet:actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const prNumber = context.payload.pull_request && context.payload.pull_request.number;
            const issueNumber = context.payload.issue && context.payload.issue.number;
            const dispatchNumber = context.payload.inputs && context.payload.inputs.pr_number;
            const trustedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const reviewCommands = ['/ocr', '/open-code-review'];
            const body = String((context.payload.comment && context.payload.comment.body) || '');
            const isReviewCommand = reviewCommands.some((command) => (
              body === command ||
              body.startsWith(`${command} `) ||
              body.startsWith(`${command}\n`) ||
              body.startsWith(`${command}\r\n`) ||
              body.startsWith(`${command}\t`)
            ));
            const trustedComment = trustedAssociations.has(
              context.payload.comment && context.payload.comment.author_association
            );
            const shouldRun = eventName === 'pull_request_target' ||
              eventName === 'workflow_dispatch' ||
              (eventName === 'issue_comment' &&
                Boolean(context.payload.issue && context.payload.issue.pull_request) &&
                trustedComment &&
                isReviewCommand);
            const groupNumber = prNumber || issueNumber || dispatchNumber;
            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput(
              'group_key',
              shouldRun ? `ocr-pr-review-${groupNumber}` : `ocr-pr-review-skip-${context.runId}`
            );

  code-review:
    name: OpenCodeReview
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: gate
    concurrency:
      group: ${{ needs.gate.outputs.group_key }}
      cancel-in-progress: true
    # For issue_comment, only run on PR comments requesting a review.
    # The gate job computes the comment authorization, command check, and
    # concurrency key once so skip/run decisions cannot drift.
    if: needs.gate.outputs.should_run == 'true'
    env:
      # Single source of truth for the pinned OCR package version. The cache
      # key and the install command both reference this so a version bump can
      # never leave a stale cache key pointing at the old version.
      OCR_VERSION: "1.7.7"
    # Infrastructure failures are intentionally non-blocking for PR checks, but
    # these outputs let the notification job distinguish a completed OCR review
    # from a review that could not run because of provider, install, or script
    # issues, and from a genuine policy breach.
    outputs:
      infrastructure_failure: ${{ steps.ocr-classification.outputs.infrastructure_failure }}
      policy_failure: ${{ steps.ocr-classification.outputs.policy_failure }}
    steps:
      - name: Resolve PR context
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # ratchet:actions/github-script@v7
        id: pr-context
        with:
          script: |
            const number = (context.payload.pull_request && context.payload.pull_request.number)
              || (context.issue && context.issue.number)
              || Number(context.payload.inputs && context.payload.inputs.pr_number);
            if (!number) {
              core.setFailed('Could not resolve a pull request number from the event.');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number,
            });
            core.setOutput('number', String(number));
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout trusted base
        # Fork-safety keystone: check out the trusted base branch (never the
        # PR head) so the working tree never reflects PR-supplied files.
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # ratchet:actions/checkout@v5
        with:
          ref: ${{ steps.pr-context.outputs.base_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize OCR artifact files
        shell: bash
        run: |
          : > ocr-result.json
          : > ocr-stdout.raw
          : > ocr-stderr.log
          : > ocr-version.txt
          : > ocr-preview.txt
          : > ocr-preview-stderr.log
          : > ocr-exit-code.txt
          : > ocr-phase.txt
          : > ocr-infrastructure-failure.txt
          : > ocr-policy-failure.txt

      - name: Fetch PR head and compute merge-base
        env:
          PR_NUMBER: ${{ steps.pr-context.outputs.number }}
          HEAD_SHA: ${{ steps.pr-context.outputs.head_sha }}
          BASE_SHA: ${{ steps.pr-context.outputs.base_sha }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          { set +x; } 2>/dev/null
          cleanup_git_auth() {
            set +e
            git config --global --unset-all safe.directory "$GITHUB_WORKSPACE" 2>/dev/null || true
            unset GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0
            unset AUTH_B64
          }
          trap cleanup_git_auth EXIT
          trap 'cleanup_git_auth; exit 130' INT TERM
          trap 'cleanup_git_auth; exit 129' HUP
          umask 077
          GH_SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"
          GH_SERVER_URL="${GH_SERVER_URL%/}/"
          # Scope safe.directory to this trusted workspace only (never '*').
          # Persist one entry for later steps, then also add it to the global
          # config while the fetch-step auth header is passed only to git fetch.
          git config --file "${HOME}/.gitconfig" --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # Fetch the PR head into an explicit local ref WITHOUT making it the
          # working copy, so no PR-supplied scripts become executable.
          # The one-command env config makes auth explicit for this fetch even
          # when the runner's Git ignores the temp global config for HTTP auth.
          # Use basic auth with the x-access-token username, matching the
          # header format actions/checkout persists. GitHub's smart HTTP
          # endpoint rejects "bearer" for this token type, and git then
          # falls back to an interactive username prompt, which fails.
          AUTH_B64="$(printf '%s' "x-access-token:${GH_TOKEN}" | base64 | tr -d '\n')"
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0="http.${GH_SERVER_URL}.extraheader"
          export GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${AUTH_B64}"
          if ! git fetch origin "pull/${PR_NUMBER}/head:pr-head"; then
            unset GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0 AUTH_B64
            echo "::error::Failed to fetch PR head ref."
            exit 1
          fi
          unset GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0 AUTH_B64
          if ! git cat-file -e "${BASE_SHA}^{commit}"; then
            echo "::error::Base SHA ${BASE_SHA} is missing after trusted checkout. It may no longer be reachable from origin."
            exit 1
          fi

          BASE_SHA="$(git merge-base "${BASE_SHA}" pr-head)"
          FETCHED_HEAD="$(git rev-parse pr-head)"
          if [ "${FETCHED_HEAD}" != "${HEAD_SHA}" ]; then
            echo "::error::PR head changed between API resolution and fetch (expected ${HEAD_SHA}, got ${FETCHED_HEAD}). Re-run to review the latest push."
            exit 1
          fi
          cleanup_git_auth
          trap - EXIT INT TERM HUP
          {
            echo "BASE_SHA=${BASE_SHA}"
            echo "HEAD_SHA=${HEAD_SHA}"
          } >> "$GITHUB_ENV"

      - name: Cache npm download cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: ~/.npm
          key: npm-ocr-${{ runner.os }}-${{ env.OCR_VERSION }}
          restore-keys: |
            npm-ocr-${{ runner.os }}-

      - name: Install OpenCodeReview
        shell: bash
        run: |
          set -uo pipefail
          echo "install" > ocr-phase.txt
          # Isolated local prefix install (never global): lifecycle scripts are
          # disabled and the install is scoped per run+attempt so concurrent
          # runners cannot collide. Failures here are non-blocking infrastructure
          # failures, recorded for the posting and notification steps.
          OCR_PREFIX="${RUNNER_TEMP}/ocr-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          npm install --prefix "$OCR_PREFIX" --ignore-scripts "@alibaba-group/open-code-review@${OCR_VERSION}" 2>> ocr-stderr.log
          install_status=$?
          if [ "$install_status" -ne 0 ]; then
            echo "::warning::OpenCodeReview installation failed."
            echo "70" > ocr-exit-code.txt
            echo "phase=install; reason=OpenCodeReview installation failed" > ocr-infrastructure-failure.txt
            exit 0
          fi
          OCR_BIN="${OCR_PREFIX}/node_modules/.bin/ocr"
          echo "${OCR_PREFIX}/node_modules/.bin" >> "$GITHUB_PATH"
          echo "OCR_BIN=${OCR_BIN}" >> "$GITHUB_ENV"
          if [ ! -x "$OCR_BIN" ]; then
            echo "::warning::OpenCodeReview command was not found after install."
            echo "127" > ocr-exit-code.txt
            echo "phase=install; reason=OpenCodeReview command was not found after install" > ocr-infrastructure-failure.txt
            exit 0
          fi
          if ! "$OCR_BIN" version > ocr-version.txt 2>> ocr-stderr.log; then
            echo "::warning::OpenCodeReview version check failed."
            echo "70" > ocr-exit-code.txt
            echo "phase=install; reason=OpenCodeReview version check failed" > ocr-infrastructure-failure.txt
            exit 0
          fi
          cat ocr-version.txt

      - name: Configure OCR review rules
        # Project policy: changed test files must be reviewed. OCR's default
        # rules exclude test/spec files, so re-include them here. This config
        # is written from this trusted workflow only (env-provided JSON); no
        # PR-supplied OCR rules are ever loaded.
        #
        # Include patterns cover this Rust project (source lives under
        # `workflow/`): *_test.rs, *_tests.rs, tests/**, test/**, __tests__/**,
        # plus the cross-language patterns kept for mixed-language PRs.
        env:
          OCR_RULES_JSON: |
            {
              "include": [
                "**/*.test.{js,jsx,ts,tsx}",
                "**/*.spec.{js,jsx,ts,tsx}",
                "**/__tests__/**",
                "**/tests/**",
                "**/test/**",
                "**/*_test.go",
                "**/*Test.java",
                "**/*Tests.java",
                "**/*_test.rs",
                "**/*_tests.rs",
                "**/*_test.py",
                "**/*_spec.rb"
              ],
              "exclude": [
                "**/target/**",
                "**/node_modules/**",
                "**/dist/**",
                "**/build/**",
                "**/*.min.js",
                "**/generated/**",
                "**/vendor/**"
              ]
            }
        shell: bash
        run: |
          mkdir -p "${HOME}/.opencodereview"
          printf '%s' "$OCR_RULES_JSON" > "${HOME}/.opencodereview/rule.json"

      - name: Validate OCR configuration
        env:
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_MODEL: ${{ vars.OCR_LLM_MODEL }}
          OCR_USE_ANTHROPIC: ${{ vars.OCR_LLM_USE_ANTHROPIC }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -s ocr-exit-code.txt ]; then
            echo "::warning::Skipping OCR configuration validation because an earlier OCR setup failure was recorded."
            exit 0
          fi
          echo "validate" > ocr-phase.txt
          missing=0
          if [ -z "${OCR_LLM_URL:-}" ]; then
            echo "::warning::Required variable OCR_LLM_URL is not set"
            echo "Required variable OCR_LLM_URL is not set" >> ocr-stderr.log
            missing=1
          fi
          if [ -z "${OCR_LLM_TOKEN:-}" ]; then
            echo "::warning::Required secret OCR_LLM_AUTH_TOKEN is not set"
            echo "Required secret OCR_LLM_AUTH_TOKEN is not set" >> ocr-stderr.log
            missing=1
          fi
          if [ -z "${OCR_LLM_MODEL:-}" ]; then
            echo "::warning::Required variable OCR_LLM_MODEL is not set"
            echo "Required variable OCR_LLM_MODEL is not set" >> ocr-stderr.log
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "78" > ocr-exit-code.txt
            echo "phase=validate; reason=OCR configuration is missing required variables or secrets" > ocr-infrastructure-failure.txt
            exit 0
          fi

      - name: Validate OCR LLM connectivity
        env:
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_MODEL: ${{ vars.OCR_LLM_MODEL }}
          OCR_USE_ANTHROPIC: ${{ vars.OCR_LLM_USE_ANTHROPIC }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -s ocr-exit-code.txt ]; then
            echo "::warning::Skipping OCR LLM connectivity check because an earlier OCR setup/configuration failure was recorded."
            exit 0
          fi
          echo "llm-preflight" > ocr-phase.txt
          if [ ! -x "$OCR_BIN" ]; then
            echo "::warning::OpenCodeReview command is unavailable before LLM connectivity check."
            echo "OpenCodeReview command is unavailable before LLM connectivity check." >> ocr-stderr.log
            echo "127" > ocr-exit-code.txt
            echo "phase=llm-preflight; reason=OpenCodeReview command is unavailable before LLM connectivity check" > ocr-infrastructure-failure.txt
            exit 0
          fi
          set +e
          timeout 120s "$OCR_BIN" llm test >> ocr-stderr.log 2>&1
          preflight_status=$?
          set -e
          if [ "$preflight_status" -ne 0 ]; then
            if [ "$preflight_status" -eq 124 ]; then
              echo "::warning::OCR LLM connectivity check timed out after 120s. Verify provider availability and network latency."
              echo "phase=llm-preflight; reason=OCR LLM connectivity check timed out" > ocr-infrastructure-failure.txt
            else
              echo "::warning::OCR LLM connectivity check failed. Verify OCR_LLM_URL, OCR_LLM_AUTH_TOKEN, OCR_LLM_MODEL, and provider availability."
              echo "phase=llm-preflight; reason=OCR LLM connectivity check failed" > ocr-infrastructure-failure.txt
            fi
            echo "$preflight_status" > ocr-exit-code.txt
            exit 0
          fi

      - name: Verify review scope includes changed tests
        env:
          BASE_SHA: ${{ env.BASE_SHA }}
          HEAD_SHA: ${{ env.HEAD_SHA }}
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_MODEL: ${{ vars.OCR_LLM_MODEL }}
          OCR_USE_ANTHROPIC: ${{ vars.OCR_LLM_USE_ANTHROPIC }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -s ocr-exit-code.txt ]; then
            echo "::warning::Skipping OCR preview because an earlier OCR setup/configuration failure was recorded."
            exit 0
          fi
          echo "preview" > ocr-phase.txt
          # Fail loudly rather than silently letting OCR exclude changed
          # test/spec files (project policy: tests must be reviewed).
          : > ocr-preview.txt
          : > ocr-preview-stderr.log
          # Only require review scope for test files that still exist at HEAD.
          # `--diff-filter=ACMRT` excludes deletions (D): a removed test file
          # cannot appear in OCR's reviewed set, so including deletions here
          # would spuriously fail the scope check whenever a test is deleted.
          #
          # `--diff-filter` alone is not sufficient: whether a removed file is
          # reported as a deletion (D) versus surfaced through a rename pairing
          # (R) depends on git's heuristic rename detection, which varies with
          # rename limits and the number of changed files across environments.
          # A large decomposition can therefore surface a path that no longer
          # exists at HEAD, which OCR can never place in its reviewed set. To
          # make the stated "still exist at HEAD" intent mechanical and immune
          # to that variance, post-filter the candidate list to paths that are
          # actually present in the HEAD tree.
          candidate_tests="$(
            git diff --name-only --diff-filter=ACMRT "${BASE_SHA}..${HEAD_SHA}" \
              | grep -Ei '(^|/)(tests?|specs?|__tests__)/.*(\.(rs|ts|tsx|js|jsx|mjs|cjs|go|py|java|c|cc|cpp|h|hpp|rb|php|kt|kts|swift|scala))$|(^|/)(test_[^/]*\.py|[^/]*_test\.py|[^/]*_test\.go|[^/]*_spec\.(rs|ts|tsx|js|jsx|mjs|cjs|go|py|java|c|cc|cpp|h|hpp|rb|php|kt|kts|swift|scala)|[^/]*(Test|Tests)\.java|[^/]*_test\.(c|cc|cpp|h|hpp))$|(\.test\.|\.spec\.|_tests?\.rs|_spec\.rs)$' \
              || true
          )"
          changed_tests=""
          while IFS= read -r candidate; do
            [ -z "$candidate" ] && continue
            # Keep only paths that resolve to a blob at HEAD. A path missing
            # here was removed by this PR (or only surfaced via rename
            # detection) and cannot be part of OCR's reviewed set.
            if git cat-file -e "${HEAD_SHA}:${candidate}" 2>/dev/null; then
              changed_tests="${changed_tests}${candidate}"$'\n'
            fi
          done <<< "$candidate_tests"
          changed_tests="$(printf '%s' "$changed_tests" | sed '/^$/d')"
          if [ -n "$changed_tests" ]; then
            echo "Changed test/spec files detected that must be reviewed:"
            echo "$changed_tests"
            if [ ! -x "$OCR_BIN" ]; then
              echo "::warning::OpenCodeReview command is unavailable before preview."
              echo "OpenCodeReview command is unavailable before preview." >> ocr-preview-stderr.log
              echo "127" > ocr-exit-code.txt
              echo "phase=preview; reason=OpenCodeReview command is unavailable before preview" > ocr-infrastructure-failure.txt
              exit 0
            fi
            # Inspect OCR preview scope. Each changed test must appear in
            # the reviewed set and must not appear in the excluded set.
            set +e
            "$OCR_BIN" review --preview --from "$BASE_SHA" --to "$HEAD_SHA" \
              > ocr-preview.txt 2> ocr-preview-stderr.log
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "::warning::Could not verify OCR preview scope for changed test files."
              echo "$status" > ocr-exit-code.txt
              echo "phase=preview; reason=OCR preview command failed" > ocr-infrastructure-failure.txt
              exit 0
            fi
            # Belt-and-suspenders: NO_COLOR is set workflow-wide, but if the
            # CLI still emits escapes, strip CSI and OSC sequences so the
            # section/path parsers below see plain text (otherwise every
            # changed test is reported as missing).
            sed -i 's/\x1b\[[0-9;?<>=]*[A-Za-z]//g; s/\x1b\][^\x07\x1b]*\(\x07\|\x1b\\\)//g' ocr-preview.txt
            reviewed="$(awk '
              BEGIN { IGNORECASE = 1; in_section = 0 }
              /^Will review[[:space:]]*\(/ { in_section = 1; next }
              /^[[:alpha:] ]+[[:space:]]*\([0-9]+\):/ { in_section = 0 }
              in_section { print }
            ' ocr-preview.txt || true)"
            excluded="$(awk '
              BEGIN { IGNORECASE = 1; in_section = 0 }
              /^Excluded[[:space:]]*\(/ { in_section = 1; next }
              /^[[:alpha:] ]+[[:space:]]*\([0-9]+\):/ { if (in_section) in_section = 0 }
              in_section { print }
            ' ocr-preview.txt || true)"
            missing=""
            excluded_tests=""
            path_in_section() {
              awk -v target="$1" '
                {
                  line = $0
                  sub(/^[[:space:]]*/, "", line)
                  sub(/^[-*][[:space:]]*/, "", line)
                  sub(/^\[[^]]+\][[:space:]]*/, "", line)
                  sub(/^[[:space:]]*/, "", line)
                  split(line, fields, /[[:space:]]+/)
                  candidate = fields[1]
                  quote = sprintf("%c", 39)
                  if ((substr(candidate, 1, 1) == "\"" && substr(candidate, length(candidate), 1) == "\"") ||
                      (substr(candidate, 1, 1) == quote && substr(candidate, length(candidate), 1) == quote)) {
                    candidate = substr(candidate, 2, length(candidate) - 2)
                  }
                  if (candidate == target) found = 1
                }
                END { exit found ? 0 : 1 }
              '
            }
            while IFS= read -r t; do
              [ -z "$t" ] && continue
              if ! echo "$reviewed" | path_in_section "$t"; then
                missing="${missing}${t}"$'\n'
              fi
              if echo "$excluded" | path_in_section "$t"; then
                excluded_tests="${excluded_tests}${t}"$'\n'
              fi
            done <<< "$changed_tests"
            if [ -n "$missing" ]; then
              echo "::error::OCR preview did not list changed test files in the reviewed set:"
              echo "$missing"
              echo "changed-test-missing" > ocr-phase.txt
              echo "1" > ocr-exit-code.txt
              echo "changed test files were missing from OCR reviewed set" > ocr-policy-failure.txt
              exit 1
            fi
            if [ -n "$excluded_tests" ]; then
              echo "::error::OCR would exclude changed test files that must be reviewed:"
              echo "$excluded_tests"
              echo "changed-test-excluded" > ocr-phase.txt
              echo "1" > ocr-exit-code.txt
              echo "changed test files were excluded from OCR reviewed set" > ocr-policy-failure.txt
              exit 1
            fi
          fi

      - name: Run OpenCodeReview
        # Full merge-base..head diff. Parse failures are handled distinctly
        # in the posting step (OCR failed vs. no findings).
        env:
          BASE_SHA: ${{ env.BASE_SHA }}
          HEAD_SHA: ${{ env.HEAD_SHA }}
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_MODEL: ${{ vars.OCR_LLM_MODEL }}
          OCR_USE_ANTHROPIC: ${{ vars.OCR_LLM_USE_ANTHROPIC }}
        shell: bash
        run: |
          set +e
          if [ -s ocr-exit-code.txt ]; then
            echo "::warning::Skipping OCR review because an earlier OCR setup/configuration/preview failure was recorded."
            exit 0
          fi
          echo "review" > ocr-phase.txt
          if [ ! -x "$OCR_BIN" ]; then
            echo "::warning::OpenCodeReview command is unavailable before review."
            echo "OpenCodeReview command is unavailable before review." >> ocr-stderr.log
            echo "127" > ocr-exit-code.txt
            echo "phase=review; reason=OpenCodeReview command is unavailable before review" > ocr-infrastructure-failure.txt
            exit 0
          fi
          # --concurrency 2 caps account-wide provider contention so a shared
          # StepFun quota (HTTP 429 "concurrency reached") is not tripped by a
          # single PR review.
          "$OCR_BIN" review \
            --from "$BASE_SHA" \
            --to "$HEAD_SHA" \
            --format json \
            --audience agent \
            --concurrency 2 \
            --timeout 30 \
            > ocr-stdout.raw 2> ocr-stderr.log
          status=$?
          if ! cp ocr-stdout.raw ocr-result.json; then
            : > ocr-result.json
          fi
          echo "$status" > ocr-exit-code.txt
          if [ "$status" -ne 0 ]; then
            if grep -Eqi "http 429|concurrency reached|rate limit" ocr-stderr.log; then
              echo "phase=review; reason=rate-limited: OCR provider concurrency/rate limit reached" > ocr-infrastructure-failure.txt
            elif grep -Eqi "all [0-9]+ file review(\(s\)|s)? failed" ocr-stderr.log; then
              echo "phase=review; reason=all OCR per-file reviews failed; likely LLM provider/config/auth failure" > ocr-infrastructure-failure.txt
            else
              echo "phase=review; reason=OCR review command failed" > ocr-infrastructure-failure.txt
            fi
          fi
          exit 0

      - name: Post OCR results
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # ratchet:actions/github-script@v7
        env:
          BASE_SHA: ${{ env.BASE_SHA }}
          HEAD_SHA: ${{ env.HEAD_SHA }}
          PR_NUMBER: ${{ steps.pr-context.outputs.number }}
          # Exact OCR endpoint/credential values are provided only for redaction;
          # do not log process.env from this step.
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- luther-ocr-review -->';
            const INLINE_MARKER = '<!-- luther-ocr-inline -->';
            const INFRA_FAILURE_FILE = 'ocr-infrastructure-failure.txt';
            const POLICY_FAILURE_FILE = 'ocr-policy-failure.txt';
            const ocrTokenForRedaction = process.env.OCR_LLM_TOKEN;
            const ocrUrlForRedaction = process.env.OCR_LLM_URL;
            delete process.env.OCR_LLM_TOKEN;
            delete process.env.OCR_LLM_URL;
            const number = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(number) || number <= 0) {
              core.setFailed('No valid PR number resolved from pr-context step.');
              return;
            }
            const headSha = process.env.HEAD_SHA;
            if (!headSha) {
              core.setFailed('No valid HEAD_SHA resolved from environment.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            function readTrimmed(fileName, fallback = '') {
              try {
                return fs.readFileSync(fileName, 'utf8').trim();
              } catch (_) {
                return fallback;
              }
            }

            // Redaction is defined inline below (canonical patterns kept in
            // sync with .github/scripts/ocr-redaction.js) so this step never
            // depends on a separately checked-out file. The shared module is
            // loaded when present (trusted base-branch checkout, never PR
            // code) so the single-source-of-truth is used post-merge; the
            // inline fallback guarantees redaction during the transition
            // before the module reaches every base checkout.
            const ocrRedactionModulePath = `${process.env.GITHUB_WORKSPACE}/.github/scripts/ocr-redaction.js`;
            let redactDiagnosticsWithSecrets;
            try {
              redactDiagnosticsWithSecrets = require(ocrRedactionModulePath).redactSecretDiagnostics;
            } catch (_) {
              const REDACTION = '[REDACTED]';
              const escapeRegExpLocal = (v) => String(v).replace(/[\\^$.*+?()[\]{}|]/g, '\\$&');
              redactDiagnosticsWithSecrets = (value, exactSecrets = []) => {
                let sanitized = String(value ?? '');
                const secrets = (Array.isArray(exactSecrets) ? exactSecrets : [exactSecrets])
                  .filter((s) => typeof s === 'string' && s.length > 0);
                for (const secret of secrets) {
                  sanitized = sanitized.replace(new RegExp(escapeRegExpLocal(secret), 'g'), REDACTION);
                }
                return sanitized
                  .replace(/\b(Authorization\s*:\s*(?:(?:Bearer|Basic|token|ApiKey)\s+)?)([^\s,;]+)/gi, '$1[REDACTED]')
                  .replace(/\b(x-api-key\s*:\s*)([^\s,;]+)/gi, '$1[REDACTED]')
                  .replace(/\b(api[_-]?key\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/([?&](?:key|api[_-]?key|token)=)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(access[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(refresh[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(id[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(token\s*[=:]\s*)([A-Za-z0-9_./+=:@-]{16,})/gi, '$1[REDACTED]')
                  .replace(/\b(secret\s*[=:]\s*)([A-Za-z0-9_./+=:@-]{16,})/gi, '$1[REDACTED]');
              };
            }
            function redactSecretDiagnostics(value) {
              return redactDiagnosticsWithSecrets(value, [ocrTokenForRedaction, ocrUrlForRedaction]);
            }

            function sanitizeExcerpt(value) {
              return redactSecretDiagnostics(value)
                .split('\n')
                .slice(0, 40)
                .join('\n') || '(empty)';
            }

            function stderrSection(title, fileName) {
              const excerpt = sanitizeExcerpt(readTrimmed(fileName, ''));
              return [
                `### ${title}`,
                '',
                '```text',
                excerpt.slice(0, 4000),
                '```',
              ];
            }

            let ocrVersion = readTrimmed('ocr-version.txt', 'unknown') || 'unknown';
            const phase = readTrimmed('ocr-phase.txt', 'unknown') || 'unknown';

            let ran = true;
            let findings = [];
            const policyFailure = readTrimmed(POLICY_FAILURE_FILE, '');
            let exitCode = 0;
            const rawExit = readTrimmed('ocr-exit-code.txt', '');
            if (!rawExit) {
              exitCode = 1;
            } else {
              const parsedExit = Number(rawExit);
              exitCode = Number.isInteger(parsedExit) ? parsedExit : 1;
            }
            if (exitCode !== 0) {
              ran = false;
            }
            function findingsFromParsed(parsed) {
              if (Array.isArray(parsed)) return parsed;
              // ocr --format json emits an object envelope with a comments
              // array (e.g. { "status": "success", "comments": [...] }).
              if (parsed && typeof parsed === 'object' && Array.isArray(parsed.comments)) {
                return parsed.comments;
              }
              return null;
            }

            function parseFindings(raw) {
              const trimmed = raw.trim();
              if (!trimmed) return null;
              try {
                return findingsFromParsed(JSON.parse(trimmed));
              } catch (parseErr) {
                const start = trimmed.indexOf('[');
                const end = trimmed.lastIndexOf(']');
                if (start < 0 || end <= start) {
                  core.warning(redactSecretDiagnostics(`OCR result was not valid JSON and no JSON array could be extracted: ${parseErr.message || parseErr}`));
                  return null;
                }
                try {
                  return findingsFromParsed(JSON.parse(trimmed.slice(start, end + 1)));
                } catch (innerErr) {
                  core.warning(redactSecretDiagnostics(`OCR result was not valid JSON and extracted array substring could not be parsed: ${innerErr.message || innerErr}`));
                  return null;
                }
              }
            }

            function escapeMarkdownHtml(value) {
              return value
                .replace(new RegExp('&', 'g'), '&amp;')
                .replace(new RegExp('<', 'g'), '&lt;')
                .replace(new RegExp('>', 'g'), '&gt;');
            }

            function renderFindingText(value) {
              const text = escapeMarkdownHtml(redactSecretDiagnostics(String(typeof value === 'string' && value ? value : 'OCR finding'))
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1')
                .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1'))
                .replace(/@/g, '@\u200b')
                .replace(/^(\s*[-*]\s*)\[[ xX]\]/gm, '$1\\[ \\]');
              return `> ${text.replace(/\n/g, '\n> ')}`;
            }

            function unrenderFindingText(value) {
              return redactSecretDiagnostics(String(value || 'OCR finding')
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/^> ?/gm, '')
                .trim());
            }

            function inlineCommentKey(comment) {
              const startLine = comment.start_line || '';
              return `${comment.path}\u0000${comment.line}\u0000${startLine}\u0000${unrenderFindingText(comment.body)}`;
            }

            async function existingInlineCommentKeys() {
              const comments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner, repo, pull_number: number, per_page: 100,
              });
              return new Set(comments
                .filter((comment) => comment.commit_id === headSha
                  && typeof comment.body === 'string'
                  && comment.body.includes(INLINE_MARKER))
                .map((comment) => inlineCommentKey({
                  path: comment.path,
                  line: comment.line || comment.original_line,
                  start_line: comment.start_line || comment.original_start_line,
                  body: comment.body,
                })));
            }
            if (policyFailure) {
              ran = false;
              core.warning('Skipping OCR output parsing because an OCR policy failure was recorded.');
            } else if (exitCode === 0) {
              try {
                const raw = fs.readFileSync('ocr-result.json', 'utf8');
                const parsed = parseFindings(raw);
                if (parsed) {
                  findings = parsed;
                } else {
                  ran = false;
                }
              } catch (parseErr) {
                core.warning(redactSecretDiagnostics(`Failed to parse OCR JSON output: ${parseErr.message || parseErr}`));
                ran = false;
              }
            } else {
              core.warning(`Skipping OCR output parsing because phase ${phase} already recorded exit code ${exitCode}.`);
            }

            // Split findings into inline (resolvable file/line) vs. lineless.
            const inline = [];
            const lineless = [];
            for (const f of findings) {
              if (f && f.path && Number.isInteger(f.start_line) &&
                  Number.isInteger(f.end_line) && f.start_line > 0 && f.end_line > 0) {
                let startLine = Number(f.start_line);
                let endLine = Number(f.end_line);
                if (startLine > endLine) {
                  [startLine, endLine] = [endLine, startLine];
                }
                const rawText = f.content || f.comment || f.message || f.body;
                const text = renderFindingText(typeof rawText === 'string' ? rawText : 'OCR finding');
                const comment = {
                  path: String(f.path),
                  line: endLine,
                  side: 'RIGHT',
                  body: `${INLINE_MARKER}\n${text}`,
                };
                if (startLine < endLine) {
                  comment.start_line = startLine;
                  comment.start_side = 'RIGHT';
                }
                inline.push(comment);
              } else {
                lineless.push(f && typeof f === 'object' ? f : { body: f || 'Malformed OCR finding' });
              }
            }

            // Post inline comments via a COMMENT review on the head SHA.
            let postedInline = 0;
            if (ran && inline.length > 0) {
              try {
                await github.rest.pulls.createReview({
                  owner, repo, pull_number: number,
                  event: 'COMMENT', commit_id: headSha, comments: inline,
                });
                postedInline = inline.length;
              } catch (batchErr) {
                core.warning(redactSecretDiagnostics(`Batch review post failed (${inline.length} comments), falling back to individual posting: ${batchErr.message || batchErr}`));
                // Fallback: post each inline comment individually, with a cap to avoid secondary rate limits.
                let existingInlineKeys = new Set();
                try {
                  existingInlineKeys = await existingInlineCommentKeys();
                } catch (listErr) {
                  core.warning(redactSecretDiagnostics(`Could not list existing OCR inline comments before fallback posting: ${listErr.message || listErr}`));
                }
                const MAX_INLINE_FALLBACK = 50;
                for (const [index, c] of inline.entries()) {
                  if (index >= MAX_INLINE_FALLBACK) {
                    const lineRange = c.start_line && c.start_line !== c.line
                      ? `${c.start_line}-${c.line}`
                      : String(c.line);
                    const overflowBody = `${unrenderFindingText(c.body)} (line ${lineRange})`;
                    lineless.push({
                      path: c.path,
                      comment: overflowBody,
                      message: overflowBody,
                      body: overflowBody,
                    });
                    continue;
                  }
                  if (existingInlineKeys.has(inlineCommentKey(c))) {
                    core.warning(`Skipping duplicate OCR inline comment on ${c.path}:${c.line} after batch post uncertainty.`);
                    postedInline += 1;
                    continue;
                  }
                  try {
                    await github.rest.pulls.createReviewComment({
                      owner,
                      repo,
                      pull_number: number,
                      commit_id: headSha,
                      path: c.path,
                      line: c.line,
                      side: c.side,
                      body: c.body,
                      ...(c.start_line ? { start_line: c.start_line, start_side: c.start_side } : {}),
                    });
                    postedInline += 1;
                    await new Promise((resolve) => setTimeout(resolve, 1000));
                  } catch (commentErr) {
                    core.warning(redactSecretDiagnostics(`Failed to post inline comment on ${c.path}:${c.line}: ${commentErr.message || commentErr}`));
                    const lineRange = c.start_line && c.start_line !== c.line
                      ? `${c.start_line}-${c.line}`
                      : String(c.line);
                    const fallbackBody = `${unrenderFindingText(c.body)} (line ${lineRange})`;
                    lineless.push({
                      path: c.path,
                      comment: fallbackBody,
                      message: fallbackBody,
                      body: fallbackBody,
                    });
                  }
                }
              }
            }

            // Build the sticky summary, including lineless findings.
            const artifactLine =
              'Artifacts: `ocr-review-output` contains raw JSON, stdout, stderr, preview, phase, and exit-code diagnostics.';
            let statusLine;
            if (!ran) {
              statusLine = policyFailure
                ? `⚠️ OCR policy failure: ${policyFailure}`
                : '⚠️ OCR failed to run or parse output.';
            } else if (findings.length === 0) {
              statusLine = '✅ No findings.';
            } else {
              statusLine = `🔎 ${findings.length} finding(s) (${postedInline} posted inline).`;
            }
            const infrastructureFailure = readTrimmed(INFRA_FAILURE_FILE, '');
            let body = [
              MARKER,
              `## OpenCodeReview — PR #${number}`,
              '',
              `- Reviewed head SHA: \`${headSha}\``,
              `- Merge base: \`${process.env.BASE_SHA}\``,
              `- OCR version: \`${ocrVersion}\``,
              `- Phase: \`${phase}\``,
              `- Exit code: \`${exitCode}\``,
              `- Run: ${runUrl}`,
              `- ${statusLine}`,
              `- ${artifactLine}`,
            ];
            if (infrastructureFailure) {
              const sanitizedInfrastructureFailure = redactSecretDiagnostics(infrastructureFailure);
              body.push(`- Infrastructure diagnostic: \`${sanitizedInfrastructureFailure.replace(/`/g, "\\`")}\``);
            }
            if (!ran || infrastructureFailure) {
              body.push(
                '',
                ...stderrSection('OCR stderr excerpt', 'ocr-stderr.log'),
                '',
                ...stderrSection('OCR preview stderr excerpt', 'ocr-preview-stderr.log'),
              );
            }
            if (lineless.length > 0) {
              body.push('', '### Findings without a resolvable position', '');
              for (const f of lineless) {
                const item = f && typeof f === 'object' ? f : {};
                const where = item.path ? `\`${item.path}\`: ` : '';
                const rawText = item.content || item.comment || item.message || item.body;
                const text = renderFindingText(typeof rawText === 'string' ? rawText : 'OCR finding');
                body.push(`- ${where}${text}`);
              }
            }
            const summary = body.join('\n');

            // Sticky summary: update in place if the marker exists, else create.
            // Wrapped so a comment API hiccup cannot fail the workflow.
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: number, per_page: 100,
              });
              const markerComments = comments.filter((c) =>
                c.body && c.body.includes(MARKER));
              const existing = markerComments[0];
              for (const duplicate of markerComments.slice(1)) {
                try {
                  await github.rest.issues.deleteComment({
                    owner, repo, comment_id: duplicate.id,
                  });
                  await new Promise((resolve) => setTimeout(resolve, 1000));
                } catch (duplicateError) {
                  core.warning(redactSecretDiagnostics(`Failed to delete duplicate OCR marker comment ${duplicate.id}: ${duplicateError.message || duplicateError}`));
                }
              }
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body: summary,
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: number, body: summary,
                });
              }
            } catch (summaryError) {
              core.warning(redactSecretDiagnostics(`Failed to post OCR sticky summary; continuing without failing the workflow: ${summaryError.message || summaryError}`));
            }

            // Policy failures are blocking; infrastructure/unparsable failures
            // are surfaced as non-blocking warnings.
            if (!ran) {
              if (policyFailure) {
                core.setFailed(`OCR policy failure: ${policyFailure}`);
              } else {
                core.warning(`OpenCodeReview failed or produced unparsable output (exit code ${exitCode}).`);
              }
            }

      - name: Resolve OCR failure classification
        id: ocr-classification
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -s ocr-policy-failure.txt ]; then
            echo "policy_failure=true" >> "$GITHUB_OUTPUT"
          else
            echo "policy_failure=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -s ocr-infrastructure-failure.txt ]; then
            echo "infrastructure_failure=true" >> "$GITHUB_OUTPUT"
          else
            echo "infrastructure_failure=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Redact OCR diagnostic artifacts
        if: always()
        # Redaction runs inside the trusted github-script action (fs read/write
        # + JS regex), never via a node/perl run step, so the fork-safety guard
        # forbidding inline interpreters in run: blocks still holds.
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # ratchet:actions/github-script@v7
        env:
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
        with:
          script: |
            const fs = require('fs');
            const ocrToken = process.env.OCR_LLM_TOKEN;
            const ocrUrl = process.env.OCR_LLM_URL;
            delete process.env.OCR_LLM_TOKEN;
            delete process.env.OCR_LLM_URL;
            // Redaction is defined inline below (canonical patterns kept in
            // sync with .github/scripts/ocr-redaction.js) so this step never
            // depends on a separately checked-out file. The shared module is
            // loaded when present (trusted base-branch checkout, never PR
            // code) so the single-source-of-truth is used post-merge; the
            // inline fallback guarantees redaction during the transition
            // before the module reaches every base checkout.
            const ocrRedactionModulePath = `${process.env.GITHUB_WORKSPACE}/.github/scripts/ocr-redaction.js`;
            let redactDiagnosticsWithSecrets;
            try {
              redactDiagnosticsWithSecrets = require(ocrRedactionModulePath).redactSecretDiagnostics;
            } catch (_) {
              const REDACTION = '[REDACTED]';
              const escapeRegExpLocal = (v) => String(v).replace(/[\\^$.*+?()[\]{}|]/g, '\\$&');
              redactDiagnosticsWithSecrets = (value, exactSecrets = []) => {
                let sanitized = String(value ?? '');
                const secrets = (Array.isArray(exactSecrets) ? exactSecrets : [exactSecrets])
                  .filter((s) => typeof s === 'string' && s.length > 0);
                for (const secret of secrets) {
                  sanitized = sanitized.replace(new RegExp(escapeRegExpLocal(secret), 'g'), REDACTION);
                }
                return sanitized
                  .replace(/\b(Authorization\s*:\s*(?:(?:Bearer|Basic|token|ApiKey)\s+)?)([^\s,;]+)/gi, '$1[REDACTED]')
                  .replace(/\b(x-api-key\s*:\s*)([^\s,;]+)/gi, '$1[REDACTED]')
                  .replace(/\b(api[_-]?key\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/([?&](?:key|api[_-]?key|token)=)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(access[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(refresh[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(id[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(token\s*[=:]\s*)([A-Za-z0-9_./+=:@-]{16,})/gi, '$1[REDACTED]')
                  .replace(/\b(secret\s*[=:]\s*)([A-Za-z0-9_./+=:@-]{16,})/gi, '$1[REDACTED]');
              };
            }
            function redactSecretDiagnostics(value) {
              return redactDiagnosticsWithSecrets(value, [ocrToken, ocrUrl]);
            }
            const diagnosticArtifacts = [
              'ocr-result.json',
              'ocr-stdout.raw',
              'ocr-stderr.log',
              'ocr-version.txt',
              'ocr-preview.txt',
              'ocr-preview-stderr.log',
              'ocr-exit-code.txt',
              'ocr-phase.txt',
              'ocr-infrastructure-failure.txt',
              'ocr-policy-failure.txt',
            ];
            for (const fileName of diagnosticArtifacts) {
              let raw;
              try {
                raw = fs.readFileSync(fileName, 'utf8');
              } catch (readError) {
                if (readError && readError.code === 'ENOENT') {
                  continue;
                }
                raw = '';
              }
              // Fail closed: destroy the original on disk *before* attempting
              // redaction so that a redaction or fallback write error can never
              // leave unredacted secrets behind for the artifact upload.
              const placeholder = `[redaction unavailable for ${fileName}]\n`;
              try {
                fs.writeFileSync(fileName, placeholder);
              } catch (_) {
                core.warning(`Could not overwrite ${fileName} before redaction; skipping upload of potentially unredacted content`);
                continue;
              }
              try {
                const redacted = redactSecretDiagnostics(raw);
                fs.writeFileSync(fileName, redacted);
              } catch (redactError) {
                const code = (redactError && redactError.code) || 'unknown';
                try {
                  fs.writeFileSync(fileName, placeholder);
                } catch (_) {
                  core.warning(`Redaction failed for ${fileName} (${code}) and placeholder could not be rewritten`);
                }
              }
            }

      - name: Ensure OCR artifact placeholders exist
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          missing=""
          for file_name in \
            ocr-result.json \
            ocr-stdout.raw \
            ocr-stderr.log \
            ocr-version.txt \
            ocr-preview.txt \
            ocr-preview-stderr.log \
            ocr-exit-code.txt \
            ocr-phase.txt \
            ocr-infrastructure-failure.txt \
            ocr-policy-failure.txt; do
            if [ ! -e "$file_name" ]; then
              : > "$file_name"
              missing="${missing}${file_name}"$'\n'
            fi
          done
          if [ -n "$missing" ]; then
            echo "::warning::OCR artifact placeholders were missing before upload:"
            echo "$missing"
            if [ ! -s ocr-exit-code.txt ]; then
              echo "127" > ocr-exit-code.txt
            fi
            if [ ! -s ocr-phase.txt ]; then
              echo "artifact" > ocr-phase.txt
            fi
            if [ ! -s ocr-infrastructure-failure.txt ]; then
              echo "phase=artifact; reason=OCR artifact placeholders were missing before upload" > ocr-infrastructure-failure.txt
            fi
          fi

      - name: Upload OCR artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: ocr-review-output
          path: |
            ocr-result.json
            ocr-stdout.raw
            ocr-stderr.log
            ocr-version.txt
            ocr-preview.txt
            ocr-preview-stderr.log
            ocr-exit-code.txt
            ocr-phase.txt
            ocr-infrastructure-failure.txt
            ocr-policy-failure.txt
          if-no-files-found: warn

      - name: Clean up scoped safe.directory
        if: always()
        shell: bash
        run: |
          set +e
          git config --file "${HOME}/.gitconfig" --unset-all safe.directory "$GITHUB_WORKSPACE" 2>/dev/null || true

  notify-ocr-infrastructure-failure:
    name: Notify OCR infrastructure failure
    runs-on: ubuntu-latest
    needs: code-review
    # Minimal per-job permissions: only issue creation/commenting and read
    # access to the run's own artifacts. Declared explicitly rather than
    # inherited from the top-level block for least-privilege auditability.
    permissions:
      issues: write
      actions: read
    # Skipped/cancelled superseded OCR runs should not create infrastructure
    # issues; successful runs still check artifacts because OCR runtime failures
    # are non-blocking, and failed runs may still have artifacts from an
    # unexpected later failure.
    if: ${{ !cancelled() && (needs.code-review.result == 'success' || needs.code-review.result == 'failure') }}
    timeout-minutes: 5
    concurrency:
      group: ocr-review-infrastructure-issue
      cancel-in-progress: false
    steps:
      - name: Checkout trusted base for shared scripts
        # Fork-safety: pull_request_target runs the base-branch workflow, so the
        # default ref here is the trusted base commit (never the PR head). This
        # only provides the checked-in shared redaction script; no PR-supplied
        # code is fetched or executed. Runs before the artifact download so the
        # checkout's clean step cannot remove the downloaded diagnostics.
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # ratchet:actions/checkout@v5
        with:
          persist-credentials: false

      - name: Download OCR artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ocr-review-output
          path: ocr-review-output

      - name: Notify OCR infrastructure failure issue
        if: always()
        # Implemented entirely with actions/github-script (octokit + fs + JS
        # redaction) so no gh CLI, perl, or node run-step interpreter is used.
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # ratchet:actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CODE_REVIEW_POLICY_FAILURE: ${{ needs.code-review.outputs.policy_failure }}
          CODE_REVIEW_INFRASTRUCTURE_FAILURE: ${{ needs.code-review.outputs.infrastructure_failure }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const ISSUE_TITLE = 'OCR review infrastructure failure';
            const ARTIFACT_DIR = 'ocr-review-output';
            const ocrToken = process.env.OCR_LLM_TOKEN;
            const ocrUrl = process.env.OCR_LLM_URL;
            delete process.env.OCR_LLM_TOKEN;
            delete process.env.OCR_LLM_URL;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = process.env.RUN_URL;
            const policyFailureOutput = process.env.CODE_REVIEW_POLICY_FAILURE === 'true';
            const infrastructureFailureOutput = process.env.CODE_REVIEW_INFRASTRUCTURE_FAILURE === 'true';

            // Redaction is defined inline below (canonical patterns kept in
            // sync with .github/scripts/ocr-redaction.js) so this step never
            // depends on a separately checked-out file. The shared module is
            // loaded when present (trusted base-branch checkout, never PR
            // code) so the single-source-of-truth is used post-merge; the
            // inline fallback guarantees redaction during the transition
            // before the module reaches every base checkout.
            const ocrRedactionModulePath = `${process.env.GITHUB_WORKSPACE}/.github/scripts/ocr-redaction.js`;
            let redactDiagnosticsWithSecrets;
            try {
              redactDiagnosticsWithSecrets = require(ocrRedactionModulePath).redactSecretDiagnostics;
            } catch (_) {
              const REDACTION = '[REDACTED]';
              const escapeRegExpLocal = (v) => String(v).replace(/[\\^$.*+?()[\]{}|]/g, '\\$&');
              redactDiagnosticsWithSecrets = (value, exactSecrets = []) => {
                let sanitized = String(value ?? '');
                const secrets = (Array.isArray(exactSecrets) ? exactSecrets : [exactSecrets])
                  .filter((s) => typeof s === 'string' && s.length > 0);
                for (const secret of secrets) {
                  sanitized = sanitized.replace(new RegExp(escapeRegExpLocal(secret), 'g'), REDACTION);
                }
                return sanitized
                  .replace(/\b(Authorization\s*:\s*(?:(?:Bearer|Basic|token|ApiKey)\s+)?)([^\s,;]+)/gi, '$1[REDACTED]')
                  .replace(/\b(x-api-key\s*:\s*)([^\s,;]+)/gi, '$1[REDACTED]')
                  .replace(/\b(api[_-]?key\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/([?&](?:key|api[_-]?key|token)=)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(access[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(refresh[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(id[_-]?token\s*[=:]\s*)([^\s,;&]+)/gi, '$1[REDACTED]')
                  .replace(/\b(token\s*[=:]\s*)([A-Za-z0-9_./+=:@-]{16,})/gi, '$1[REDACTED]')
                  .replace(/\b(secret\s*[=:]\s*)([A-Za-z0-9_./+=:@-]{16,})/gi, '$1[REDACTED]');
              };
            }
            function redactSecretDiagnostics(value) {
              return redactDiagnosticsWithSecrets(value, [ocrToken, ocrUrl]);
            }
            function readArtifact(fileName) {
              try {
                return fs.readFileSync(path.join(ARTIFACT_DIR, fileName), 'utf8').trim();
              } catch (_) {
                return '';
              }
            }

            let phase = readArtifact('ocr-phase.txt') || 'unknown';
            const rawExit = readArtifact('ocr-exit-code.txt');
            let exitCode = 'unknown';
            if (rawExit && /^[0-9]+$/.test(rawExit)) {
              exitCode = rawExit;
            }
            let infraFailure = readArtifact('ocr-infrastructure-failure.txt');
            let policyFailure = readArtifact('ocr-policy-failure.txt');
            if (!policyFailure && policyFailureOutput) {
              policyFailure = 'policy failure recorded by code-review job output';
            }
            const artifactsPresent = fs.existsSync(ARTIFACT_DIR);
            // Only synthesize an artifact-phase infrastructure failure when the
            // code-review job explicitly recorded one (infrastructureFailureOutput
            // is set by the classification step, which reads the
            // ocr-infrastructure-failure.txt file written by the OCR steps
            // themselves). This prevents spurious issues for non-OCR failures
            // (git checkout errors, cache failures, posting-step exceptions) that
            // fail the code-review job without producing an OCR diagnostic.
            if (!infraFailure && !artifactsPresent && infrastructureFailureOutput) {
              phase = 'artifact';
              infraFailure = 'phase=artifact; reason=OCR artifacts were unavailable after code-review recorded an infrastructure failure';
            }

            // Policy failures are the PR author's responsibility and must not
            // spawn an infrastructure tracking issue.
            if (policyFailure) {
              core.notice('OCR policy failure detected; skipping infrastructure issue notification.');
              return;
            }
            if (!infraFailure) {
              core.info('No OCR infrastructure failure recorded; nothing to notify.');
              return;
            }

            const sanitizedInfraFailure = redactSecretDiagnostics(infraFailure);
            const today = new Date().toISOString().slice(0, 10);
            const diagnosticBlock = sanitizedInfraFailure
              .split('\n')
              .map((line) => `    ${line}`)
              .join('\n');
            const body = [
              `OCR review infrastructure failure on ${today}. Phase: ${phase}. Exit code: ${exitCode}. Artifact: ocr-review-output. Infrastructure diagnostic:`,
              '',
              diagnosticBlock,
              '',
              `Run: ${runUrl}. Raw stderr remains available only in the workflow artifact.`,
            ].join('\n');

            async function withRetry(action) {
              for (let attempt = 1; attempt <= 4; attempt += 1) {
                try {
                  return await action();
                } catch (error) {
                  if (attempt === 4) {
                    throw error;
                  }
                  await new Promise((resolve) => setTimeout(resolve, attempt * 5000));
                }
              }
              return undefined;
            }

            async function findExistingIssue() {
              const query = `repo:${owner}/${repo} in:title is:issue state:open "${ISSUE_TITLE}"`;
              const result = await withRetry(() => github.rest.search.issuesAndPullRequests({
                q: query,
                sort: 'created',
                order: 'desc',
                per_page: 30,
              }));
              const items = (result && result.data && result.data.items) || [];
              const match = items.find((item) => item.title === ISSUE_TITLE && !item.pull_request);
              return match ? match.number : undefined;
            }

            // Practical idempotency (not atomic): GitHub's REST API provides no
            // atomic create-if-absent for issues, so we cannot guarantee a
            // single tracking issue under all concurrency. The strategy below
            // is layered to minimize duplicates and self-heal if they occur:
            //   1. The workflow-level concurrency group serializes notify runs.
            //   2. A pre-create double-check narrows the race window.
            //   3. A post-create deduplication sweep closes any duplicate
            //      tracking issues (keeping the oldest), so a transient race
            //      self-corrects on the next run rather than accumulating.
            // createComment is non-idempotent: never retry it (a transient
            // response failure could create duplicate comments).
            async function commentOnExisting(issueNumber) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body,
              });
            }

            async function createTrackingIssue() {
              // issues.create is non-idempotent: never retry the final create
              // call. The label-vs-no-label fallback handles a distinct error
              // class (missing label), not a retry of the same request.
              try {
                await github.rest.issues.create({
                  owner, repo, title: ISSUE_TITLE, body, labels: ['ci/cd'],
                });
              } catch (labelError) {
                core.warning(redactSecretDiagnostics(`Failed to create OCR infrastructure issue with ci/cd label; retrying without labels: ${labelError.message || labelError}`));
                await github.rest.issues.create({
                  owner, repo, title: ISSUE_TITLE, body,
                });
              }
            }

            // Self-healing deduplication: if two concurrent runs each created a
            // tracking issue, close all but the oldest open one. This is called
            // after every create and after every comment-on-existing path so the
            // invariant (at most one open tracking issue) converges over time
            // even if a race slipped through.
            async function deduplicateTrackingIssues() {
              try {
                const query = `repo:${owner}/${repo} in:title is:issue state:open "${ISSUE_TITLE}"`;
                const result = await withRetry(() => github.rest.search.issuesAndPullRequests({
                  q: query, sort: 'created', order: 'asc', per_page: 30,
                }));
                const items = ((result && result.data && result.data.items) || [])
                  .filter((item) => item.title === ISSUE_TITLE && !item.pull_request);
                if (items.length <= 1) return;
                // Keep the oldest (first in ascending order); close the rest.
                for (const dup of items.slice(1)) {
                  try {
                    await github.rest.issues.update({
                      owner, repo, issue_number: dup.number,
                      state: 'closed',
                      state_reason: 'not_planned',
                    });
                    core.info(`Closed duplicate OCR infrastructure tracking issue #${dup.number} (kept oldest).`);
                  } catch (closeErr) {
                    core.warning(redactSecretDiagnostics(`Could not close duplicate tracking issue #${dup.number}: ${closeErr.message || closeErr}`));
                  }
                }
              } catch (dedupErr) {
                core.warning(redactSecretDiagnostics(`Tracking-issue deduplication sweep failed; continuing: ${dedupErr.message || dedupErr}`));
              }
            }

            try {
              let existing = await findExistingIssue();
              if (existing) {
                await commentOnExisting(existing);
                await deduplicateTrackingIssues();
                return;
              }
              // Re-check just before creating to narrow the race window.
              existing = await findExistingIssue();
              if (existing) {
                await commentOnExisting(existing);
                await deduplicateTrackingIssues();
                return;
              }
              await createTrackingIssue();
              // After creating, sweep for any duplicate a concurrent run may
              // have created in the gap between the second check and create.
              await deduplicateTrackingIssues();
            } catch (notifyError) {
              core.warning(redactSecretDiagnostics(`OCR infrastructure issue notification failed; continuing: ${notifyError.message || notifyError}`));
            }
