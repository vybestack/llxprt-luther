# LLxprt-Luther Dogfood Workflow Configuration

config_id = "llxprt-luther"
workflow_type_id = "llxprt-luther-dogfood-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
target_repo = "vybestack/llxprt-luther"
repository_owner = "vybestack"
repository_name = "llxprt-luther"
assignee = "acoliver"
work_dir = "/tmp/luther-workspaces/llxprt-luther"
artifact_dir = "/tmp/luther-artifacts/llxprt-luther"
primary_issue_number = "3"
issue_number = "3"

base_branch = "main"
profile_planning = "opusthinking"
profile_evaluating = "opusthinking"
profile_implementing = "opusthinking"
profile_remediating = "opusthinking"
luther_label = "Luther working"
ok_label = "OK for Luther"

[[command_manifest.commands]]
id = "format"
argv = ["cargo", "fmt", "--check", "--manifest-path", "workflow/Cargo.toml"]
timeout_seconds = 300
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "check"
argv = ["cargo", "check", "--manifest-path", "workflow/Cargo.toml"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["cargo", "build", "--manifest-path", "workflow/Cargo.toml"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["cargo", "test", "--manifest-path", "workflow/Cargo.toml"]
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "clippy"
argv = ["cargo", "clippy", "--manifest-path", "workflow/Cargo.toml", "--all-targets", "--", "-D", "warnings"]
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["cargo", "xtask", "ocr-review", "--preview"]
working_directory = "workflow"
timeout_seconds = 300
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "check", "build", "test", "clippy", "ocr_review"]
post_pr = ["test"]
review = ["ocr_review"]
