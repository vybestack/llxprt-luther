# LLxprt-Luther Dogfood Workflow Configuration

config_id = "llxprt-luther"
workflow_type_id = "llxprt-luther-dogfood-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"
project_subdir = "workflow"
artifact_path_base = "."
diff_path_base = "workflow"
diff_path_normalization = "repo_relative"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[discovery]
enabled = true
approval_label = "OK for Luther"
approval_actor = "acoliver"
claim_assignee = "acoliver"
claim_label = "Luther working"
include_labels = ["OK for Luther"]
exclude_labels = ["Luther working"]
active_parent_label = "Luther working"
issue_states = ["open"]
max_concurrent_runs = 1
poll_interval_secs = 300
route_parent_issues = true
parent_workflow_type_id = "parent-issue-orchestrator-v1"
parent_config_id = "parent-orchestrator-luther"
skip_children_of_active_parents = true

[variables]
daemon_managed_claim = "false"
claim_assignment_added = "true"
claim_label_added = "true"
primary_issue_number = "3"
issue_number = "3"
profile_planning = "gpt56solhigh"
profile_evaluating = "gpt56solhigh"
profile_implementing = "gpt56solhigh"
profile_remediating = "gpt56solhigh"
plan_static_content = ""

[target_profile.identity]
repo = "vybestack/llxprt-luther"
base_branch = "main"

[target_profile.paths]
project_subdir = "workflow"
default_command_cwd = "workflow"
work_dir = "/tmp/luther-workspaces/llxprt-luther"
artifact_dir = "/tmp/luther-artifacts/llxprt-luther"
artifact_path_base = "."
diff_path_base = "workflow"

[target_profile.issue_conventions]
assignee = "acoliver"
ok_label = "OK for Luther"
luther_label = "Luther working"

[target_profile.pr_conventions]
title_prefix = "Fix"
body_guidance = "Mention the fixed issue, summarize source/test changes, and call out workflow/auth-sensitive changes."

[target_profile.templates]
branch = "issue{issue_number}"
pr_title = "Fix #{issue_number}: {issue_title}"
pr_body = "{pr_body_guidance}"

[target_profile.diff_policy]
required_changed_path_pattern = "workflow"
required_path_regex = "^(workflow/(src/|config/|tests/|docs/)|\\.github/workflows/)"
failure_message = "No issue #{issue_number} workflow/source/test diff found and no reusable open PR exists"
allowed_path_patterns = [".github/workflows/**", "workflow/**", "docs/**"]
required_path_patterns = ["workflow/src/**", "workflow/config/**", "workflow/tests/**", "workflow/docs/**"]

[target_profile.command_groups]
local = "local"
post_pr = "post_pr"
review = "review"
full = "full"

[target_profile.pr_checks]
required = ["Tests (lib + integration)", "Format (rustfmt)", "Lint (clippy + structural)", "Release readiness (release build)", "Coverage (llvm-cov gate)", "Docs (cargo doc)", "Security (cargo audit)", "OpenCodeReview"]
ignored = ["CodeRabbit"]

[target_profile.auth]
requirements = ["gh", "git", "cargo", "cargo-llvm-cov", "cargo-audit", "workflow scope for workflow-file changes"]

[target_profile.preflight]
expectations = ["verify workflow auth before editing .github/workflows"]

[target_profile.prompt_guidance]
ecosystem_name = "Rust"
planning = "Use Luther's Rust workflow subcrate conventions and include fixture parity when changing config schema."
implementation = "Respect strict clippy limits, avoid lint suppressions, and keep workflow shell commands statically allowlisted. Decompose by responsibility into cohesive mod submodules with narrow visibility (private, pub(crate), or pub(super)) when hitting file-size/complexity/structural guardrails; never use include!() to assemble Rust modules."
review = "Run Open Code Review through the configured cargo xtask wrapper when review gates are requested."
verification = "Use targeted workflow crate commands only when needed; the workflow runs configured cargo gates."
style = "Keep Rust functions under strict clippy size and complexity limits. Name modules after their responsibility; never split by line count."
fixture_parity = "Maintain TOML/JSON fixture parity for valid workflow and workflow-config fixtures."
forbidden_actions = "Do not loosen lint rules, add suppressions, or edit generated/unrelated files. Do not use include!() for Rust source module assembly, do not create part_N/core_N/tail/misc/utils/support buckets to satisfy file-size limits, and do not increase complexity/size thresholds."
remediation_scope = "Fix only current-branch diff issues and required evaluator feedback."
command_manifest_summary = "Local gates run cargo fmt, check, clippy, test, fixture parity, and shell safety checks."

[[command_manifest.commands]]
id = "format"
argv = ["cargo", "fmt", "--check"]
project_subdirectory = "workflow"
timeout_seconds = 300
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "check"
argv = ["cargo", "check"]
project_subdirectory = "workflow"
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["cargo", "build"]
project_subdirectory = "workflow"
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["cargo", "test"]
project_subdirectory = "workflow"
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "clippy"
argv = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]
project_subdirectory = "workflow"
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "coverage"
argv = ["cargo", "xtask", "coverage"]
project_subdirectory = "workflow"
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "docs"
argv = ["cargo", "doc", "--no-deps"]
project_subdirectory = "workflow"
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "audit"
argv = ["cargo", "audit"]
project_subdirectory = "workflow"
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "release_readiness"
argv = ["cargo", "xtask", "release-readiness"]
project_subdirectory = "workflow"
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["cargo", "xtask", "ocr-review", "--preview"]
project_subdirectory = "workflow"
timeout_seconds = 300
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "check", "build", "test", "clippy", "ocr_review"]
post_pr = ["test", "coverage"]
review = ["ocr_review"]
full = ["format", "check", "build", "test", "clippy", "coverage", "docs", "audit", "release_readiness", "ocr_review"]
