# LLxprt-Code Workflow Configuration
# @plan:PLAN-20260408-LLXPRT-FIRST.P17
# @requirement:REQ-LF-PROF-001,REQ-LF-PROF-002,REQ-LF-PROF-003

config_id = "llxprt-code"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[discovery]
enabled = false
include_labels = ["OK for Luther"]
exclude_labels = ["Luther working"]
issue_states = ["open"]
active_parent_label = "Luther working"
max_concurrent_runs = 1
poll_interval_secs = 300
route_parent_issues = true
parent_workflow_type_id = "parent-issue-orchestrator-v1"
parent_config_id = "parent-orchestrator-code"
skip_children_of_active_parents = true

[variables]
primary_issue_number = "0"
issue_number = "0"
profile_planning = "gpt55high"
profile_evaluating = "gpt55high"
profile_implementing = "ollamaglm51"
profile_remediating = "ollamaglm51"
plan_static_content = ""

[target_profile.identity]
repo = "vybestack/llxprt-code"
base_branch = "main"

[target_profile.paths]
default_command_cwd = "."
work_dir = "/tmp/luther-workspaces/llxprt-code"
artifact_dir = "/tmp/luther-artifacts/llxprt-code"

[target_profile.issue_conventions]
assignee = "acoliver"
ok_label = "OK for Luther"
luther_label = "Luther working"

[target_profile.pr_conventions]
title_prefix = "Fix"
body_guidance = "Follow CodeRabbit/LLxprt conventions, include verification commands, and mention package/workspace impact."

[target_profile.templates]
branch = "issue{issue_number}"
pr_title = "Fix #{issue_number}: {issue_title}"
pr_body = "{pr_body_guidance}"

[target_profile.diff_policy]
required_changed_path_pattern = ""
required_path_regex = "."
failure_message = "No issue #{issue_number} source/test diff found and no reusable open PR exists"
allowed_path_patterns = ["packages/**", "scripts/**", "src/**", "test/**", "tests/**", ".github/workflows/**"]
required_path_patterns = ["packages/**", "src/**", "test/**", "tests/**"]
commit_exclude_pathspecs = [":!packages/vscode-ide-companion/NOTICES.txt"]

[target_profile.command_groups]
local = "local"
post_pr = "post_pr"
review = "review"

[target_profile.bootstrap]
command_group = "bootstrap"

[target_profile.pr_checks]
required = ["format", "lint", "typecheck", "build", "test", "CodeQL"]
ignored = ["CodeRabbit"]

[target_profile.auth]
requirements = ["gh", "git", "npm registry access"]

[target_profile.preflight]
expectations = ["npm ci completes before local gates"]

[target_profile.prompt_guidance]
ecosystem_name = "TypeScript/npm"
planning = "Use the npm TypeScript monorepo layout and prefer existing package scripts over ad hoc commands."
implementation = "Do not loosen eslint guardrails or add TypeScript/ESLint suppressions; fix the underlying issue."
review = "Review CodeRabbit/LLxprt conventions and keep PR comments shell-safe."
verification = "Use targeted npm scripts only when needed; the workflow runs the full configured npm manifest gates."
style = "Match the existing TypeScript package conventions and keep changes package-scoped."
fixture_parity = "Maintain TOML/JSON fixture parity for valid workflow and workflow-config fixtures."
forbidden_actions = "Do not modify package lockfiles or generated notice files unless the issue explicitly requires it."
remediation_scope = "Fix only failures caused by the current branch diff."
command_manifest_summary = "Local gates run npm format, lint, typecheck, build, bundle, test, and eslint guard commands."

[[command_manifest.commands]]
# Runs only when node_modules is absent; fatal failure halts bootstrap before reinstall checks.
id = "install_dependencies_when_missing"
argv = ["npm", "ci", "--ignore-scripts"]
timeout_seconds = 900
run_if_missing_any = ["node_modules"]
failure_outcome = "fatal"

[[command_manifest.commands]]
id = "reinstall_dependencies_when_incomplete"
argv = ["npm", "ci", "--ignore-scripts"]
timeout_seconds = 900
run_if_present_all = ["node_modules"]
# These are version-specific package-presence sentinels for the historical bootstrap guard.
# Update them when upgrading esbuild, jsdom, @ast-grep/lang-python, or @lvce-editor/ripgrep.
run_if_missing_any = ["node_modules/esbuild/index.js", "node_modules/jsdom/lib/jsdom/living/xhr/xhr-sync-worker.js", "node_modules/@ast-grep/lang-python", "node_modules/@lvce-editor/ripgrep"]
remove_before_run = ["node_modules"]
failure_outcome = "fatal"

[[command_manifest.commands]]
# Permission repair is critical-path because npm-installed CLIs must be executable for later gates.
id = "repair_node_bin_permissions"
argv = ["chmod", "-R", "+x", "node_modules/.bin"]
timeout_seconds = 120
run_if_present_all = ["node_modules/.bin"]
failure_outcome = "fatal"

[[command_manifest.commands]]
id = "format"
argv = ["npm", "run", "format:check"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "lint"
argv = ["npm", "run", "lint"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "typecheck"
argv = ["npm", "run", "typecheck"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["npm", "run", "build"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "bundle"
argv = ["npm", "run", "bundle"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["npm", "run", "test", "--workspace", "@vybestack/llxprt-code"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "eslint_guard"
argv = ["npm", "run", "lint:eslint-guard"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "codeql_build"
argv = ["npm", "run", "build"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["echo", "Local OCR wrapper is not configured for this target profile"]
timeout_seconds = 60
failure_outcome = "fatal"

[command_manifest.groups]
bootstrap = ["install_dependencies_when_missing", "reinstall_dependencies_when_incomplete", "repair_node_bin_permissions"]
local = ["format", "lint", "typecheck", "build", "bundle", "test", "eslint_guard"]
post_pr = ["test"]
review = ["ocr_review"]
codeql = ["codeql_build"]
