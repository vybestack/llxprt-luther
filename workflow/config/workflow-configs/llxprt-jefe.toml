config_id = "llxprt-jefe"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
primary_issue_number = "0"
issue_number = "0"
profile_planning = "gpt55high"
profile_evaluating = "gpt55high"
profile_implementing = "ollamaglm51"
profile_remediating = "ollamaglm51"
plan_static_content = ""

[target_profile.identity]
repo = "vybestack/llxprt-jefe"
base_branch = "main"

[target_profile.paths]
default_command_cwd = "."
work_dir = "/tmp/luther-workspaces/llxprt-jefe"
artifact_dir = "/tmp/luther-artifacts/llxprt-jefe"

[target_profile.issue_conventions]
assignee = "acoliver"
ok_label = "OK for Luther"
luther_label = "Luther working"

[target_profile.pr_conventions]
title_prefix = "Fix"
body_guidance = "Call out custom clippy policy, source-size, strict complexity, and coverage impact when relevant."

[target_profile.templates]
branch = "issue{issue_number}"
pr_title = "Fix #{issue_number}: {issue_title}"
pr_body = "{pr_body_guidance}"

[target_profile.diff_policy]
required_changed_path_pattern = ""
required_path_regex = "."
failure_message = "No issue #{issue_number} source/test diff found and no reusable open PR exists"
allowed_path_patterns = ["src/**", "tests/**", "xtask/**", "scripts/**", ".github/workflows/**"]
required_path_patterns = ["src/**", "tests/**", "xtask/**"]

[target_profile.command_groups]
local = "local"
post_pr = "post_pr"
review = "review"

[target_profile.pr_checks]
required = ["format", "clippy policy", "strict complexity", "coverage", "build", "test"]
ignored = ["CodeRabbit"]

[target_profile.auth]
requirements = ["gh", "git", "cargo", "cargo-llvm-cov"]

[target_profile.preflight]
expectations = ["custom clippy config and allow policy scripts must run through manifest commands"]

[target_profile.prompt_guidance]
planning = "Treat llxprt-jefe as a Rust root project with repo-specific gates, not as a generic Rust default."
implementation = "Keep clippy allow policy and source length checks configured as manifest gates rather than engine steps."
review = "Include strict complexity and llvm-cov outcomes in remediation notes when those gates fail."

[[command_manifest.commands]]
id = "format"
argv = ["cargo", "fmt", "--all", "--check"]
timeout_seconds = 300
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "check"
argv = ["cargo", "check", "--workspace", "--all-features", "--locked"]
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["cargo", "build", "--workspace", "--all-features", "--locked"]
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["cargo", "test", "--workspace", "--all-features", "--locked"]
timeout_seconds = 1800
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "clippy_custom_config"
argv = ["cargo", "clippy", "--workspace", "--all-features", "--locked", "--", "-D", "warnings"]
timeout_seconds = 1800
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "clippy_allow_policy"
argv = ["python3", "scripts/check-clippy-allows.py"]
timeout_seconds = 600
failure_outcome = "fatal"

[[command_manifest.commands]]
id = "source_length"
argv = ["python3", "scripts/check-source-length.py"]
timeout_seconds = 600
failure_outcome = "fatal"

[[command_manifest.commands]]
id = "strict_complexity"
argv = ["cargo", "clippy", "--workspace", "--all-targets", "--all-features", "--locked", "--", "-D", "warnings"]
timeout_seconds = 1800
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "coverage"
argv = ["cargo", "llvm-cov", "--workspace", "--all-features", "--locked", "--fail-under-lines", "80"]
timeout_seconds = 1800
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["echo", "Local OCR wrapper is not configured for this target profile"]
timeout_seconds = 60
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "check", "build", "test", "clippy_custom_config", "clippy_allow_policy", "source_length", "strict_complexity", "coverage"]
post_pr = ["test", "coverage"]
review = ["ocr_review"]
