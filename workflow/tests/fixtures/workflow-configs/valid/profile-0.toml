# Workflow Configuration Profile 0
# @plan:PLAN-20260404-INITIAL-RUNTIME.P03

config_id = "profile-0"
workflow_type_id = "issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3
parallel_steps = 1
log_level = "info"

[repository]
workspace_strategy = "temp_clone"
branch_template = "luther-fix-{issue_number}"
base_branch = "main"

[guards]
max_iterations = 10
max_file_changes = 50
max_tokens = 100000
max_cost = 10.00
