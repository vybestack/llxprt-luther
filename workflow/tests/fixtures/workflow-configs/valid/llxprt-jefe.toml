config_id = "llxprt-jefe"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
target_repo = "vybestack/llxprt-jefe"
repository_owner = "vybestack"
repository_name = "llxprt-jefe"
assignee = "acoliver"
work_dir = "/tmp/luther-workspaces/llxprt-jefe"
artifact_dir = "/tmp/luther-artifacts/llxprt-jefe"
primary_issue_number = "0"
issue_number = "0"
base_branch = "main"
profile_planning = "gpt55high"
profile_evaluating = "gpt55high"
profile_implementing = "ollamaglm51"
profile_remediating = "ollamaglm51"
luther_label = "Luther working"
ok_label = "OK for Luther"

[[command_manifest.commands]]
id = "format"
argv = ["cargo", "fmt", "--all", "--check"]
timeout_seconds = 300
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "check"
argv = ["cargo", "check", "--workspace", "--all-features", "--locked"]
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["cargo", "test", "--workspace", "--all-features", "--locked"]
timeout_seconds = 1800
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "clippy"
argv = ["cargo", "clippy", "--workspace", "--all-features", "--locked", "--", "-D", "warnings"]
timeout_seconds = 1800
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "coverage"
argv = ["cargo", "llvm-cov", "--workspace", "--all-features", "--locked", "--fail-under-lines", "80"]
timeout_seconds = 1800
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "source-size"
argv = ["cargo", "xtask", "source-size", "--locked"]
timeout_seconds = 600
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "check", "test", "clippy", "coverage", "source-size"]
post_pr = ["test"]
