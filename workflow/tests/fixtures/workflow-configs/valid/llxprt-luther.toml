# LLxprt-Luther Dogfood Workflow Configuration

config_id = "llxprt-luther"
workflow_type_id = "llxprt-luther-dogfood-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
target_repo = "vybestack/llxprt-luther"
repository_owner = "vybestack"
repository_name = "llxprt-luther"
assignee = "acoliver"
work_dir = "/tmp/luther-workspaces/llxprt-luther"
artifact_dir = "/tmp/luther-artifacts/llxprt-luther"
primary_issue_number = "3"
issue_number = "3"

base_branch = "main"
profile_planning = "gpt55high"
profile_evaluating = "gpt55high"
profile_implementing = "gpt55high"
profile_remediating = "gpt55high"
luther_label = "Luther working"
ok_label = "OK for Luther"
