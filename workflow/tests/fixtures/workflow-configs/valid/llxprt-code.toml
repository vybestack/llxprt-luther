# LLxprt-Code Workflow Configuration
# @plan:PLAN-20260408-LLXPRT-FIRST.P17
# @requirement:REQ-LF-PROF-001,REQ-LF-PROF-002,REQ-LF-PROF-003

config_id = "llxprt-code"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[discovery]
enabled = false
include_labels = ["OK for Luther"]
exclude_labels = ["Luther working"]
issue_states = ["open"]
max_concurrent_runs = 1
poll_interval_secs = 300

[variables]
target_repo = "vybestack/llxprt-code"
repository_owner = "vybestack"
repository_name = "llxprt-code"
assignee = "acoliver"
work_dir = "/tmp/luther-workspaces/llxprt-code"
artifact_dir = "/tmp/luther-artifacts/llxprt-code"
primary_issue_number = "0"
issue_number = "0"

base_branch = "main"
profile_planning = "gpt55high"
profile_evaluating = "gpt55high"
profile_implementing = "ollamaglm51"
profile_remediating = "ollamaglm51"
luther_label = "Luther working"
ok_label = "OK for Luther"
plan_static_content = ""
required_changed_path_pattern = ""
diff_required_path_regex = "."
diff_failure_message = "No issue #{issue_number} source/test diff found and no reusable open PR exists"

[[command_manifest.commands]]
id = "format"
argv = ["npm", "run", "format:check"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "lint"
argv = ["npm", "run", "lint"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "typecheck"
argv = ["npm", "run", "typecheck"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["npm", "run", "build"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["npm", "run", "test", "--workspace", "@vybestack/llxprt-code"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["echo", "Local OCR wrapper is not configured for this target profile"]
timeout_seconds = 60
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "lint", "typecheck", "build", "test"]
post_pr = ["test"]
review = ["ocr_review"]
