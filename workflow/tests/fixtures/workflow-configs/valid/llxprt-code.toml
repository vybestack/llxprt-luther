# LLxprt-Code Workflow Configuration
# @plan:PLAN-20260408-LLXPRT-FIRST.P17
# @requirement:REQ-LF-PROF-001,REQ-LF-PROF-002,REQ-LF-PROF-003

config_id = "llxprt-code"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
target_repo = "vybestack/llxprt-code"
repository_owner = "vybestack"
repository_name = "llxprt-code"
assignee = "acoliver"
work_dir = "/tmp/luther-workspaces/llxprt-code"
artifact_dir = "/tmp/luther-artifacts/llxprt-code"
primary_issue_number = "1803"
issue_number = "1803"

base_branch = "main"
profile_planning = "gpt53codexXHigh"
profile_evaluating = "gpt53codexXHigh"
profile_implementing = "gpt53codexXHigh"
profile_remediating = "gpt53codexXHigh"
luther_label = "Luther working"
ok_label = "OK for Luther"
plan_static_content = """
# Implementation Plan

1. Read {artifact_dir}/issue.md and confirm the requested behavior for issue #{issue_number}: when a stream event has contextCleared=true, any pending Gemini response text must be flushed/reset so later content starts a fresh message.
2. Inspect packages/cli/src/ui/hooks/geminiStream/useStreamEventHandlers.ts, especially processGeminiStreamEvents, geminiMessageBuffer, handleContentEvent, and the AgentExecutionStopped/AgentExecutionBlocked contextCleared branches.
3. Implement the smallest source change in useStreamEventHandlers.ts so contextCleared flushes any pending Gemini text, clears pending state, resets geminiMessageBuffer, and then preserves the existing "Conversation context has been cleared." info message.
4. Add or update focused regression tests for the contextCleared stream event path. Prefer a test near the geminiStream hook tests that proves pre-clear and post-clear content become separate Gemini messages and are not merged.
5. Run targeted verification for the changed package/files only, then keep the final diff narrowly scoped to issue #{issue_number}; do not modify package lockfiles, generated notice files, .luther files, generated build output, or unrelated files.
"""
required_changed_path_pattern = "packages/cli/src/ui/hooks/"
diff_required_path_regex = "^packages/cli/src/ui/hooks/"
diff_failure_message = "No issue #{issue_number} source/test diff found and no reusable open PR exists"
lint_command = """
CHANGED=$(git status --porcelain --untracked-files=all | sed 's/^...//' | grep -E '[.](ts|tsx|js|jsx)$' | tr '\n' ' ')
if [ -z "$CHANGED" ]; then
  echo 'No changed lint-checked files'
else
  npx eslint $CHANGED > "/tmp/luther-artifacts/llxprt-code/lint-output.log" 2>&1
  status=$?
  tail -n 240 "/tmp/luther-artifacts/llxprt-code/lint-output.log"
  exit $status
fi
"""
typecheck_command = "npm run typecheck 2>&1"
build_command = "npm run build 2>&1"
test_command = "npm run test --workspace @vybestack/llxprt-code -- useStreamEventHandlers 2>&1"
format_command = """
CHANGED=$(git status --porcelain --untracked-files=all | sed 's/^...//' | grep -E '[.](ts|tsx|js|jsx|json|md)$' | tr '\n' ' ')

if [ -z "$CHANGED" ]; then
  echo 'No changed format-checked files'
else
  npx prettier --write $CHANGED >/tmp/luther-prettier-write.log 2>&1
  npx prettier --check $CHANGED 2>&1
fi
"""
