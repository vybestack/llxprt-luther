# LLxprt-Code alternate profile fixture.
config_id = "llxprt-code-alt"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
primary_issue_number = "1804"
issue_number = "1804"
profile_planning = "gpt55high"
profile_evaluating = "gpt55high"
profile_implementing = "gpt55high"
profile_remediating = "gpt55high"
plan_static_content = """
# Implementation Plan

1. Read {artifact_dir}/issue.md and confirm the requested behavior for issue #{issue_number}: preserve explicit tool call cancellation state when a stream emits a cancellation event.
2. Inspect packages/core/src/core/StreamProcessor.ts and the adjacent stream processor tests that cover cancellation handling.
3. Implement the smallest source change so cancellation state is retained until the next tool call begins.
4. Add or update focused regression tests proving cancelled and subsequent tool calls are reported separately.
5. Run targeted verification for the changed package/files only, then keep the final diff narrowly scoped to issue #{issue_number}; do not modify package lockfiles, generated notice files, .luther files, generated build output, or unrelated files.
"""

[target_profile.identity]
repo = "vybestack/llxprt-code"
base_branch = "main"

[target_profile.paths]
default_command_cwd = "."
work_dir = "/tmp/luther-workspaces/llxprt-code-alt"
artifact_dir = "/tmp/luther-artifacts/llxprt-code-alt"

[target_profile.issue_conventions]
assignee = "acoliver"
ok_label = "OK for Luther"
luther_label = "Luther working"

[target_profile.pr_conventions]
title_prefix = "Fix"
body_guidance = "Alternate llxprt-code fixture for profile-driven tests."

[target_profile.templates]
branch = "issue{issue_number}"
pr_title = "Fix #{issue_number}: {issue_title}"
pr_body = "{pr_body_guidance}"

[target_profile.diff_policy]
required_changed_path_pattern = "packages/core/src/core/"
required_path_regex = "^packages/core/src/core/"
failure_message = "No alternate issue source/test diff found and no reusable open PR exists"
allowed_path_patterns = ["packages/**", "scripts/**", "src/**", "test/**", "tests/**"]
required_path_patterns = ["packages/core/src/core/**"]

[target_profile.command_groups]
local = "local"
post_pr = "post_pr"
review = "review"

[target_profile.pr_checks]
required = ["format", "lint", "typecheck", "build", "test"]
ignored = ["CodeRabbit"]

[target_profile.auth]
requirements = ["gh", "git", "npm registry access"]

[target_profile.preflight]
expectations = ["npm ci completes before local gates"]

[target_profile.prompt_guidance]
planning = "Use the npm TypeScript monorepo layout and prefer existing package scripts."
implementation = "Do not loosen eslint guardrails or add TypeScript/ESLint suppressions."
review = "Review CodeRabbit/LLxprt conventions."

[[command_manifest.commands]]
id = "format"
argv = ["npm", "run", "format:check"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "lint"
argv = ["npm", "run", "lint"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "typecheck"
argv = ["npm", "run", "typecheck", "--workspace", "@vybestack/llxprt-code-core"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["npm", "run", "build"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["npm", "run", "test", "--workspace", "@vybestack/llxprt-code-core", "--", "StreamProcessor"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "eslint_guard"
argv = ["npm", "run", "lint:eslint-guard"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["echo", "Local OCR wrapper is not configured for this target profile"]
timeout_seconds = 60
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "lint", "typecheck", "build", "test", "eslint_guard"]
post_pr = ["test"]
review = ["ocr_review"]
