# Alternate LLxprt-Code Workflow Configuration
# @plan:PLAN-20260408-LLXPRT-FIRST.P17
# @requirement:REQ-LF-PROF-001,REQ-LF-PROF-002,REQ-LF-PROF-003

config_id = "llxprt-code-alt"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
target_repo = "vybestack/llxprt-code"
repository_owner = "vybestack"
repository_name = "llxprt-code"
assignee = "acoliver"
work_dir = "/tmp/luther-workspaces/llxprt-code-alt"
artifact_dir = "/tmp/luther-artifacts/llxprt-code-alt"
primary_issue_number = "1804"
issue_number = "1804"

base_branch = "main"
profile_planning = "gpt55high"
profile_evaluating = "gpt55high"
profile_implementing = "gpt55high"
profile_remediating = "gpt55high"
luther_label = "Luther working"
ok_label = "OK for Luther"
plan_static_content = """
# Implementation Plan

1. Read {artifact_dir}/issue.md and confirm the requested behavior for issue #{issue_number}: preserve explicit tool call cancellation state when a stream emits a cancellation event.
2. Inspect packages/core/src/core/StreamProcessor.ts and the adjacent stream processor tests that cover cancellation handling.
3. Implement the smallest source change so cancellation state is retained until the next tool call begins.
4. Add or update focused regression tests proving cancelled and subsequent tool calls are reported separately.
5. Run targeted verification for the changed package/files only, then keep the final diff narrowly scoped to issue #{issue_number}; do not modify package lockfiles, generated notice files, .luther files, generated build output, or unrelated files.
"""
required_changed_path_pattern = "packages/core/src/core/"
diff_required_path_regex = "^packages/core/src/core/"
diff_failure_message = "No alternate issue source/test diff found and no reusable open PR exists"

[[command_manifest.commands]]
id = "format"
argv = ["npm", "run", "format:check"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "lint"
argv = ["npm", "run", "lint"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "typecheck"
argv = ["npm", "run", "typecheck", "--workspace", "@vybestack/llxprt-code-core"]
timeout_seconds = 600
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["npm", "run", "build"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["npm", "run", "test", "--workspace", "@vybestack/llxprt-code-core", "--", "StreamProcessor"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["echo", "Local OCR wrapper is not configured for this target profile"]
timeout_seconds = 60
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "lint", "typecheck", "build", "test"]
post_pr = ["test"]
review = ["ocr_review"]
