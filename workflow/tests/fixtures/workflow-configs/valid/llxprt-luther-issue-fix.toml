# LLxprt-Luther Issue Fix Workflow Configuration

config_id = "llxprt-luther-issue-fix"
workflow_type_id = "llxprt-issue-fix-v1"

[runtime]
timeout_seconds = 7200
max_retries = 3

[repository]
workspace_strategy = "temp_clone"
branch_template = "issue{issue_number}"
base_branch = "main"
project_subdir = "workflow"
artifact_path_base = "."
diff_path_base = "workflow"
diff_path_normalization = "repo_relative"

[guards]
max_iterations = 4
max_file_changes = 200
max_tokens = 500000
max_cost = 50.0

[variables]
target_repo = "vybestack/llxprt-luther"
repository_owner = "vybestack"
repository_name = "llxprt-luther"
assignee = "acoliver"
work_dir = "/tmp/luther-workspaces/llxprt-luther"
artifact_dir = "/tmp/luther-artifacts/llxprt-luther"
primary_issue_number = "3"
issue_number = "3"

base_branch = "main"
profile_planning = "opusthinking"
profile_evaluating = "opusthinking"
profile_implementing = "opusthinking"
profile_remediating = "opusthinking"
luther_label = "Luther working"
ok_label = "OK for Luther"
plan_static_content = """
# Implementation Plan

1. Read {artifact_dir}/issue.md and confirm the requested behavior for Luther issue #{issue_number}: runtime target selection must not require editing checked-in workflow templates.
2. Inspect workflow/src/cli/mod.rs, workflow/src/main.rs, workflow/src/workflow/, workflow/config/, and workflow/tests/e2e_workflow_integration.rs.
3. Implement the smallest source/config change so CLI target overrides can set repo, issue, work_dir, and artifact_dir, and unresolved target/path variables fail before execution.
4. Add or update focused tests and fixtures covering llxprt-code and llxprt-luther target profiles.
5. Run targeted verification for the changed workflow files only, then keep the final diff narrowly scoped to issue #{issue_number}.
"""
required_changed_path_pattern = "workflow"
diff_required_path_regex = "^([.]github/workflows/|workflow/(src/|config/|tests/|docs/))"
diff_failure_message = "No Luther workflow/config/test/doc diff found and no reusable open PR exists"

[[command_manifest.commands]]
id = "format"
argv = ["cargo", "fmt", "--check"]
timeout_seconds = 300
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "lint"
argv = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "typecheck"
argv = ["cargo", "check"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "build"
argv = ["cargo", "build"]
timeout_seconds = 900
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "test"
argv = ["cargo", "test", "target_profile", "e2e_workflow_integration"]
timeout_seconds = 1200
failure_outcome = "fixable"

[[command_manifest.commands]]
id = "ocr_review"
argv = ["cargo", "xtask", "ocr-review", "--preview"]
timeout_seconds = 300
failure_outcome = "fatal"

[command_manifest.groups]
local = ["format", "lint", "typecheck", "build", "test", "ocr_review"]
post_pr = ["test"]
review = ["ocr_review"]
