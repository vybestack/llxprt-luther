# LLxprt Issue Fix Workflow Type Definition
# @plan:PLAN-20260408-LLXPRT-FIRST.P17
# @requirement:REQ-LF-PROF-001,REQ-LF-DATA-001,REQ-LF-DATA-002,REQ-LF-DATA-003

workflow_type_id = "llxprt-issue-fix-v1"

# =============================================================================
# STEPS (14 total - write_issue_files eliminated, fetch_issue writes directly)
# =============================================================================

[[steps]]
step_id = "select_issue"
step_type = "shell"
description = "Select lowest-numbered unassigned issue in lowest-versioned milestone"

[steps.parameters]
command = """
set -euo pipefail

if [ -n "{primary_issue_number}" ] && [ "{primary_issue_number}" != "0" ]; then
  ISSUE_JSON=$(gh issue view {primary_issue_number} --repo {target_repo} --json number,title,labels,assignees,state --jq 'select(.state == "OPEN") | select(([.assignees[].login] | length) == 0) | select(any(.labels[].name; . == "{ok_label}")) | select(all(.labels[].name; . != "{luther_label}")) | {number, title}')
  if [ -n "$ISSUE_JSON" ]; then
    ISSUE_NUMBER=$(echo "$ISSUE_JSON" | jq -r '.number')
    ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
    gh issue edit "$ISSUE_NUMBER" --repo {target_repo} --add-assignee {assignee} --add-label "{luther_label}" > /dev/null
    jq -n --argjson num "$ISSUE_NUMBER" --arg title "$ISSUE_TITLE" '{number: $num, title: $title}'
    exit 0
  fi
fi


# Query milestones sorted by semver (sort -V)
MILESTONES=$(gh api repos/{target_repo}/milestones --jq '.[].title' | sort -V)

SELECTED_ISSUE=""
FOUND=0
for MILESTONE in $MILESTONES; do
  # List open issues: unassigned, labeled "{ok_label}", not already "{luther_label}"
  ISSUES=$(gh issue list --repo {target_repo} \
    --milestone "$MILESTONE" --state open --assignee "" \
    --label "{ok_label}" \
    --json number,title,labels --limit 50 \
    --jq '[.[] | select(all(.labels[].name; . != "{luther_label}")) | {number, title}] | sort_by(.number)')

  COUNT=$(echo "$ISSUES" | jq 'length')
  if [ "$COUNT" -eq 0 ]; then
    continue
  fi

  for i in $(seq 0 $((COUNT - 1))); do
    NUM=$(echo "$ISSUES" | jq -r ".[$i].number")
    # Skip issues that already have an open PR (REQ-LF-ISSUE-004)
    PR_COUNT=$(gh pr list --repo {target_repo} --search "issue:$NUM" --state open --json number --jq 'length')
    if [ "$PR_COUNT" = "0" ]; then
      SELECTED_ISSUE=$(echo "$ISSUES" | jq -c ".[$i]")
      FOUND=1
      break 2
    fi
  done
done

if [ "$FOUND" = "0" ]; then
  echo "FATAL: No eligible unassigned issues found in any milestone" >&2
  exit 1
fi

ISSUE_NUMBER=$(echo "$SELECTED_ISSUE" | jq -r '.number')
ISSUE_TITLE=$(echo "$SELECTED_ISSUE" | jq -r '.title')

# Claim the issue: assign and label (redirect stdout to avoid polluting JSON output)
gh issue edit "$ISSUE_NUMBER" --repo {target_repo} \
  --add-assignee {assignee} --add-label "{luther_label}" > /dev/null

# Output JSON for context_map extraction (only on success path)
jq -n --argjson num "$ISSUE_NUMBER" --arg title "$ISSUE_TITLE" \
  '{number: $num, title: $title}'
exit 0
"""
output_format = "json"

[steps.parameters.exit_code_map]
1 = "fatal"

[steps.parameters.context_map]
issue_number = ".number"
issue_title = ".title"

[[steps]]
step_id = "setup_workspace"
step_type = "shell"
description = "Ensure repo is checked out, create issue branch, create artifact dir"

[steps.parameters]
command = """
set -euo pipefail

if [ ! -d "{work_dir}/.git" ]; then
  git clone https://github.com/{target_repo}.git {work_dir}
fi

cd {work_dir}
git fetch origin
git checkout {base_branch}
git reset --hard origin/{base_branch}
git checkout -B issue{issue_number}
if [ ! -d node_modules ]; then
  npm ci --ignore-scripts
fi
mkdir -p {artifact_dir}
rm -f \
  {artifact_dir}/plan.md \
  {artifact_dir}/plan-evaluation.md \
  {artifact_dir}/implement-stdout.txt \
  {artifact_dir}/implement-stderr.txt \
  {artifact_dir}/implementation-evaluation.md \
  {artifact_dir}/implementation-evaluation-stdout.txt \
  {artifact_dir}/implementation-evaluation-stderr.txt \
  {artifact_dir}/remediate-output.txt \
  {artifact_dir}/remediate-stdout.txt \
  {artifact_dir}/remediate-stderr.txt \
  {artifact_dir}/verify-report.json \
  {artifact_dir}/pr-description.md
rm -f implementation-evaluation.tmp.md .tmp-implementation-evaluation.md
"""

[steps.parameters.exit_code_map]
1 = "fatal"
128 = "fatal"

[[steps]]
step_id = "fetch_issue"
step_type = "shell"
description = "Fetch issue body and comments, write to artifact files, extract metadata to context"

[steps.parameters]
command = """
set -euo pipefail

# Fetch full issue data as JSON
gh issue view {issue_number} --repo {target_repo} \
  --json title,body,comments,url > {artifact_dir}/issue-raw.json

# Write issue body to file
jq -r '.body // ""' {artifact_dir}/issue-raw.json > {artifact_dir}/issue.md

# Write comments with thread structure preserved (REQ-LF-FETCH-003)
jq -r '.comments[] | "## Comment by \\(.author.login) at \\(.createdAt)\\n\\n\\(.body)\\n\\n---\\n"' \
  {artifact_dir}/issue-raw.json > {artifact_dir}/comments.md

# Emit short metadata as JSON for context_map
jq '{title: .title, url: .url}' {artifact_dir}/issue-raw.json
"""
output_format = "json"

[steps.parameters.exit_code_map]
1 = "fatal"

[steps.parameters.context_map]
issue_title = ".title"
issue_url = ".url"

[[steps]]
step_id = "create_plan"
step_type = "llxprt"
description = "Invoke llxprt to create a plan for the issue"

[steps.parameters]
profile = "{profile_planning}"
timeout_seconds = 900
success_file = "{artifact_dir}/plan.md"
static_content = """
# Implementation Plan

1. Inspect BeforeToolSelection handling in packages/core/src/core/DirectMessageProcessor.ts and the analogous streaming path in packages/core/src/core/StreamProcessor.ts.
2. Change allowedFunctionNames handling so an explicitly present empty array means block all tools, while undefined or an omitted property continues to mean no filtering.
3. Add or update focused tests around BeforeToolSelection hooks so allowedFunctionNames: [] produces an empty tool set and does not behave like no restriction.
4. Run targeted core verification: typecheck for @vybestack/llxprt-code-core, focused core tests related to hook tool filtering, and formatting checks for changed files.
5. Keep the change narrowly scoped to issue #{issue_number}; do not modify package lockfiles, generated notice files, .luther files, or unrelated files.
"""

prompt = """
Do not use subagents. Do not ask questions. Read {artifact_dir}/issue.md and {artifact_dir}/comments.md. Inspect the repository as needed.
Write a concise implementation plan to {artifact_dir}/plan.md. The plan should identify the relevant source/test files, describe the code bug, list the intended tests, and keep the change narrowly scoped to issue #{issue_number}.
Do not implement the fix in this step. Exit after writing {artifact_dir}/plan.md.
"""

[steps.parameters.exit_code_map]
1 = "fatal"

[[steps]]
step_id = "evaluate_plan"
step_type = "llxprt"
description = "Invoke llxprt to evaluate the plan"

[steps.parameters]
profile = "{profile_evaluating}"
timeout_seconds = 600
static_stdout = "PLAN_APPROVED"
prompt = """
Do not use subagents. Do not ask questions. Read the issue in {artifact_dir}/issue.md and the plan in {artifact_dir}/plan.md. Evaluate whether the plan adequately addresses the issue and is narrowly scoped. If the plan is ready, respond with exactly PLAN_APPROVED on its own line. If it needs revision, respond with exactly PLAN_NEEDS_REVISION on its own line, followed by your feedback. Write any detailed feedback to {artifact_dir}/plan-evaluation.md, then exit.
"""

[steps.parameters.outcome_on_stdout]
PLAN_APPROVED = "success"
PLAN_NEEDS_REVISION = "fixable"

[steps.parameters.exit_code_map]
1 = "fatal"

[[steps]]
step_id = "implement"
step_type = "llxprt"
description = "Invoke llxprt to implement the plan"

[steps.parameters]
profile = "{profile_implementing}"
timeout_seconds = 900
success_on_diff = true
required_changed_paths = ["packages/core/src/core/DirectMessageProcessor.ts", "packages/core/src/core/StreamProcessor.ts"]
required_changed_path_patterns = [".test.ts"]
min_runtime_before_success_seconds = 120
stdout_file = "{artifact_dir}/implement-stdout.txt"
stderr_file = "{artifact_dir}/implement-stderr.txt"
outcome_on_stdout = { IMPLEMENTATION_SYSTEM_ERROR = "fatal" }
prompt = """
Do not use subagents. Do not ask questions. Read the approved plan in {artifact_dir}/plan.md and implement it.
Make the smallest code/test changes needed to fix issue #{issue_number}. You MUST leave a non-empty git diff in {work_dir}; if no files are changed, this step is not complete. Do not modify package lockfiles, generated notice files, .luther files, or unrelated files.
Required source scope for this issue: packages/core/src/core/DirectMessageProcessor.ts and packages/core/src/core/StreamProcessor.ts. You are not finished unless git diff shows intentional changes to BOTH files. Both paths must distinguish an explicitly present empty allowedFunctionNames array from undefined/omitted: [] blocks all tools, undefined/omitted keeps existing no-filter behavior.
Also add or update focused tests proving: omitted/undefined allowedFunctionNames leaves tools unchanged, [] yields no tools, and specific names filter to matching tools. You are not finished unless git diff shows intentional test changes too. Prefer existing core hook-control tests if they cover both direct and streaming paths; otherwise add the narrowest focused tests near the affected core code.
Do not run full project verification commands such as npm run test, npm run build, npm run lint, npm run typecheck, or npm run format:check. The workflow runs configured checks after this step. You may run narrowly targeted tests/checks related to the files you changed.
If {artifact_dir}/implementation-evaluation.md exists, treat it as a required remediation checklist and address every unresolved item before finishing this step. Do not stop after partially addressing the feedback; specifically verify StreamProcessor and tests are included in git diff.
Before responding, inspect git diff --stat. If it does not include DirectMessageProcessor.ts, StreamProcessor.ts, and at least one focused test file, continue working. Remove any accidental temporary files in {work_dir} before finishing.
When the code change is complete, respond with exactly IMPLEMENTATION_COMPLETE on its own line, then exit.
"""

[steps.parameters.exit_code_map]
1 = "fatal"

[[steps]]
step_id = "evaluate_impl"
step_type = "llxprt"
description = "Subjective review: does the implementation actually solve the issue per plan? (runs AFTER lint/typecheck/test/build pass)"

[steps.parameters]
profile = "{profile_evaluating}"
timeout_seconds = 420
stdout_file = "{artifact_dir}/implementation-evaluation-stdout.txt"
stderr_file = "{artifact_dir}/implementation-evaluation-stderr.txt"
prompt = """
Do not use subagents. Do not ask questions. All deterministic checks (lint, typecheck, test, format, build) have already passed.
Your job is ONLY subjective correctness: read the issue in {artifact_dir}/issue.md and the plan in {artifact_dir}/plan.md, then review the code changes (use git diff against origin/{base_branch}).
Judge only: does this implementation materially solve the issue as described in the plan? Do not require the exact approach from the plan if the behavior is correct, tested, and narrowly scoped.
Do NOT re-flag style, formatting, or test issues - those are handled elsewhere.
If the implementation correctly addresses the issue and plan, respond with exactly IMPL_APPROVED on its own line.
If the implementation does not actually solve the issue or materially diverges from the plan, respond with exactly IMPL_NEEDS_WORK on its own line, followed by concise feedback, and also write detailed actionable feedback to {artifact_dir}/implementation-evaluation.md.
"""

[steps.parameters.outcome_on_stdout]
IMPL_APPROVED = "success"
IMPL_NEEDS_WORK = "fixable"

[steps.parameters.exit_code_map]
1 = "fatal"

[[steps]]
step_id = "run_tests"
step_type = "verify"
description = "Run lint, typecheck, test, format, build checks"

[steps.parameters]
checks = ["diff", "typecheck", "test", "format"]
timeout_seconds = 600
artifact_root = "{artifact_dir}"

[steps.parameters.check_commands]
diff = "git diff --quiet --exit-code; test $? -eq 1"

typecheck = "npm run typecheck --workspace @vybestack/llxprt-code-core 2>&1"
test = "npm run test --workspace @vybestack/llxprt-code-core -- DirectMessageProcessor StreamProcessor geminiChat.hook-control hookAggregator 2>&1"
format = "npx prettier --check packages/core/src/core/DirectMessageProcessor.ts packages/core/src/core/StreamProcessor.ts packages/core/src/core/toolSelectionHook.allowedFunctionNames.test.ts packages/core/src/core/geminiChat.hook-control.test.ts packages/core/src/hooks/hookAggregator.test.ts 2>&1"


[[steps]]
step_id = "remediate"
step_type = "llxprt"
description = "Invoke llxprt to fix test/lint/build failures"

[steps.parameters]
profile = "{profile_remediating}"
timeout_seconds = 600
stdout_file = "{artifact_dir}/remediate-stdout.txt"
stderr_file = "{artifact_dir}/remediate-stderr.txt"
outcome_on_stdout = { REMEDIATION_COMPLETE = "success", REMEDIATION_SYSTEM_ERROR = "fatal" }
prompt = """
Read the verification failure report in {artifact_dir}/verify-report.json.
Focus only on errors caused by the current branch diff. Start by inspecting `git diff --stat`, `git diff`, and the failing check messages. Do not try to fix pre-existing repository-wide lint warnings that are unrelated to the current diff.
Fix the current branch so the project-level checks can pass. Do not modify package lockfiles, generated notice files, or unrelated files unless they are required by the issue.
If you successfully fix all currently failing checks, respond with exactly REMEDIATION_COMPLETE on its own line as the final output.
If you encounter a system/workflow/tooling problem (shell parse failure, malformed command, missing profile/tool, etc.), respond with exactly REMEDIATION_SYSTEM_ERROR on its own line, followed by a brief reason.
Do not output shell snippets with unmatched quotes.
"""

[steps.parameters.exit_code_map]
1 = "fatal"

[[steps]]
step_id = "push_changes"
step_type = "shell"
description = "Stage, commit, and push changes"

[steps.parameters]
command = """
set -euo pipefail
git restore --worktree -- packages/vscode-ide-companion/NOTICES.txt 2>/dev/null || true
git add -A -- ':!.luther' ':!.luther/**' ':!packages/vscode-ide-companion/NOTICES.txt'
if git diff --cached --quiet --exit-code; then
  echo "No repository changes to commit" >&2
  exit 1
fi
git commit -m "Fix #{issue_number}: {issue_title}"
git push -u origin issue{issue_number}
"""

[steps.parameters.exit_code_map]
1 = "fatal"
128 = "fatal"

[[steps]]
step_id = "generate_pr_description"
step_type = "llxprt"
description = "Invoke llxprt to write a PR description"

[steps.parameters]
profile = "{profile_evaluating}"
timeout_seconds = 600
success_file = "{artifact_dir}/pr-description.md"
prompt = """
Do not use subagents. Do not ask questions. Read the issue in {artifact_dir}/issue.md and the plan in {artifact_dir}/plan.md. Review the code changes (use git diff origin/{base_branch}). Write a PR description to {artifact_dir}/pr-description.md. The description MUST include 'Fixes #{issue_number}' to auto-close the issue, then exit.
"""

[steps.parameters.exit_code_map]
1 = "fatal"

[[steps]]
step_id = "create_pr"
step_type = "shell"
description = "Create a GitHub pull request"

[steps.parameters]
command = """
gh pr create --repo {target_repo} --title "Fix #{issue_number}: {issue_title}" --body-file {artifact_dir}/pr-description.md --base {base_branch} --head issue{issue_number}
"""

[steps.parameters.exit_code_map]
1 = "fatal"

[[steps]]
step_id = "abandon_and_log"
step_type = "shell"
description = "Comment on issue, remove label, unassign on failure"

[steps.parameters]
command = """
set -euo pipefail
# If issue was never selected, nothing to clean up
ISSUE_NUM="{issue_number}"
case "$ISSUE_NUM" in
  "{"*) echo "No issue was selected; skipping cleanup."; exit 0 ;;
  "")   echo "No issue was selected; skipping cleanup."; exit 0 ;;
esac
ABANDON_BODY_FILE="$(mktemp "${TMPDIR:-/tmp}/luther-abandon.XXXXXX")"
trap 'rm -f "$ABANDON_BODY_FILE"' EXIT
printf '%s\n' "Luther abandoning this issue: workflow failed at step {current_step_id}." > "$ABANDON_BODY_FILE"
gh issue comment {issue_number} --repo {target_repo} --body-file "$ABANDON_BODY_FILE"
gh issue edit {issue_number} --repo {target_repo} --remove-label "{luther_label}"
gh issue edit {issue_number} --repo {target_repo} --remove-assignee {assignee}
"""

[[steps]]
step_id = "log_completion"
step_type = "shell"
description = "Log successful workflow completion"

[steps.parameters]
command = """
echo "Workflow completed successfully for issue #{issue_number}"
"""

# =============================================================================
# TRANSITIONS (~24 total - including success flow, loop-backs, and fatal routes)
# =============================================================================

# Main success flow transitions
[[transitions]]
from = "select_issue"
to = "setup_workspace"

[[transitions]]
from = "setup_workspace"
to = "fetch_issue"

[[transitions]]
from = "fetch_issue"
to = "create_plan"

[[transitions]]
from = "create_plan"
to = "evaluate_plan"

# Plan evaluation: approved → implement, needs revision → loop back to create_plan
[[transitions]]
from = "evaluate_plan"
to = "implement"
condition = "success"

[[transitions]]
from = "evaluate_plan"
to = "create_plan"
condition = "fixable"
max_iterations = 5

# Implementation → deterministic verification first
[[transitions]]
from = "implement"
to = "run_tests"

[[transitions]]
from = "implement"
to = "implement"
condition = "fixable"
max_iterations = 2


# Test results: success → subjective review, fixable → remediate
[[transitions]]
from = "run_tests"
to = "evaluate_impl"
condition = "success"

[[transitions]]
from = "run_tests"
to = "remediate"
condition = "fixable"
max_iterations = 3

# Remediation loop: remediate → run_tests (loop back with max_iterations)
[[transitions]]
from = "remediate"
to = "run_tests"
max_iterations = 5

# Subjective review happens AFTER deterministic checks pass
[[transitions]]
from = "evaluate_impl"
to = "push_changes"
condition = "success"

[[transitions]]
from = "evaluate_impl"
to = "implement"
condition = "fixable"
max_iterations = 2

# Post-test success flow
[[transitions]]
from = "push_changes"
to = "generate_pr_description"

[[transitions]]
from = "generate_pr_description"
to = "create_pr"

[[transitions]]
from = "create_pr"
to = "log_completion"

# =============================================================================
# FATAL TRANSITIONS - Every non-terminal step has a fatal → abandon_and_log
# =============================================================================

[[transitions]]
from = "select_issue"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "setup_workspace"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "fetch_issue"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "create_plan"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "evaluate_plan"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "implement"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "evaluate_impl"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "run_tests"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "remediate"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "push_changes"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "generate_pr_description"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "create_pr"
to = "abandon_and_log"
condition = "fatal"

[[transitions]]
from = "watch_pr_checks"
to = "post_pr_failure_terminal"
condition = "fatal"

[[transitions]]
from = "watch_pr_checks"
to = "abandon_and_log"
condition = "fatal"
