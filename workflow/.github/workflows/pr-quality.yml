name: PR Quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint (clippy + structural)
    runs-on: ubuntu-latest
    env:
      CLIPPY_CONF_DIR: .github/clippy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run clippy strict profile
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Enforce no runtime stubs/TODO markers
        run: cargo xtask guard

      - name: Enforce complexity and file-size gates
        run: cargo xtask complexity

  test:
    name: Tests (lib + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-features --lib --tests

  coverage:
    name: Coverage (llvm-cov gate)
    runs-on: ubuntu-latest
    needs:
      - fmt
      - lint
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain + llvm tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run coverage gate
        run: cargo coverage

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: workspace-summary
          path: target/llvm-cov-target/workspace-summary.json
