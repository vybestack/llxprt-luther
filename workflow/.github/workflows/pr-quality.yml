name: PR Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint (clippy + structural)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run clippy strict profile
        run: |
          cargo clippy --all-targets -- \
            -D warnings \
            -D clippy::cognitive_complexity \
            -D clippy::too_many_lines \
            -D clippy::too_many_arguments \
            -D clippy::type_complexity \
            -D clippy::struct_excessive_bools

      - name: Enforce no runtime stubs/TODO markers
        run: cargo xtask guard

      - name: Enforce complexity and file-size gates
        run: cargo xtask complexity

  test:
    name: Tests (lib + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib --tests

  coverage:
    name: Coverage (llvm-cov gate)
    runs-on: ubuntu-latest
    needs:
      - fmt
      - lint
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain + llvm tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage gate
        run: cargo coverage

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: workspace-summary
          path: target/llvm-cov-target/workspace-summary.json
